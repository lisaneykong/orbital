name: Publish website to IONOS
on:
  push:
    branches: [ main, master ]
    paths:
      - 'index.html'
      - 'setup.html'
      - 'START-HERE.html'
      - 'manifest.json'
      - 'orbital-logo.png'
      - 'assets/**'
  workflow_dispatch: {}
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Upload website to IONOS via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.IONOS_FTP_SERVER }}
          username: ${{ secrets.IONOS_FTP_USERNAME }}
          password: ${{ secrets.IONOS_FTP_PASSWORD }}
          protocol: ftps
          exclude: |
            **/.git*
            **/.github/**
            scraper.py
            requirements.txt
            README.txt
          server-dir: ./