name: Orbital daily scrape

# Runs scraper.py in the cloud (no local machine needed) and upserts real
# space-industry roles into Supabase, which jobs.lisaney.com reads live.
#
# SETUP (one time):
#   1. Push this orbital-crm folder to a GitHub repo.
#   2. Repo -> Settings -> Secrets and variables -> Actions -> New repository secret:
#        SUPABASE_URL                = https://<your-ref>.supabase.co
#        SUPABASE_SERVICE_ROLE_KEY   = <your service_role key>
#   3. That's it. It runs daily, and you can also trigger it by hand
#      (Actions tab -> "Orbital daily scrape" -> Run workflow).

on:
  schedule:
    - cron: "0 12 * * *"   # 12:00 UTC daily (~6am CST / 7am CDT)
  workflow_dispatch: {}     # manual "Run workflow" button

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scraper.py

      - name: Upload failure log (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failed-scrapes-log
          path: failed_scrapes_log.csv
          if-no-files-found: ignore
