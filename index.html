.vaultfx span:nth-child(2){width:300px;height:300px;right:6%;bottom:10%;background:var(--a2);animation:vfloat 20s ease-in-out infinite reverse}
.vaultfx span:nth-child(3){width:220px;height:220px;left:44%;top:50%;background:var(--a3);animation:vfloat 24s ease-in-out infinite}
@keyframes vfloat{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,-30px) scale(1.2)}}
.pininput:focus{outline:none}
.gerr{font-size:.78rem;color:var(--bad);min-height:14px}

.rolechip.guest{color:#f0dcae;border:1px solid rgba(245,197,96,.4)}

.copyright a{color:var(--muted)}
.copyright .sep{opacity:.4;margin:0 7px}

.deploybar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:14px 16px;border:1px dashed rgba(55,214,230,.35);border-radius:16px;background:rgba(55,214,230,.05)}

.deploybar button{font-weight:600;font-size:.84rem;padding:11px 16px;border-radius:11px;border:0;background:linear-gradient(180deg,var(--a3),var(--a));color:#04121a}

.pushbar{display:flex;align-items:center;gap:15px;padding:13px 18px;border-radius:var(--r2);flex-wrap:wrap;

.pushbar:before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--hot),var(--gold))}

.pusht{flex:1;min-width:0}

.pusht span{display:block;font-size:.86rem;color:#dfe7f3;margin-top:2px;line-height:1.45}
.pushtag{flex:none;font-size:.6rem;font-weight:700;letter-spacing:.12em;color:var(--hot);border:1px solid rgba(255,90,77,.4);border-radius:999px;padding:5px 10px;text-transform:uppercase;white-space:nowrap}
@media(max-width:680px){.pushtag{display:none}.pushbar{gap:12px}}

  .wxvs{padding:4px}
}

function statMedian(arr){ if(!arr.length) return 0; const s=[...arr].sort((a,b)=>a-b); const m=s.length>>1; return s.length%2 ? s[m] : Math.round((s[m-1]+s[m])/2); }
// region opportunity pool — space-gated + region + match floor, but IGNORES the
// Full-time/Internship toggle and search query so the KPI cards describe the whole
// pool (otherwise the Internships card reads 0 whenever Full-time is selected).
function regionPool(){
  let base = dataMode==='live' ? (liveJobs||[]).map(r=>enhanceMatch(mapLiveJob(r))) : JOBS.map(j=>enhanceMatch(j));
  let out = base.filter(j=> (j.live || spaceQualifies(j)) && (showArchived||!isArchived(j)) && (region==='global'||j.region===region) && ((j.match||0)>=settings.matchFloor || (j.live && j.type==='Internship')) );
  return out; // live + empty → genuinely empty (No Data); never backfill with demo rows
}
function statsForRegion(){
  const pool = regionPool();
  // Matched/Hot/Median describe what you're actually LOOKING AT (respect the Full-time/
  // Internship toggle) so the KPI cards never disagree with the list below them.

  const jobs = pool.filter(j=> track==='intern' ? j.type==='Internship' : track==='fulltime' ? j.type!=='Internship' : true);

/* =====================================================================================
   ENHANCED MATCHING ENGINE — 5 upgrades on top of the base scraped/sample match score:
   1. Tiered skill weighting (core skills count more than secondary ones)
   2. Seniority-level fit (penalizes roles far above/below your target level)
   3. Dealbreaker detection (docks score for hard blockers: active clearance, PE/A&P/CDL licenses)
   4. Relocation/visa signal bonus (rewards roles that actually help you get there)
   5. Learned preference nudge (saves vs. dismissals quietly retrain future scoring)
   Runs once per job (cached by id) right after data loads, so match score, the 70% firewall,
   sorting, the scatterplot, and every chart all reflect the SAME enhanced number.
   ===================================================================================== */
OWNER.coreSkills = ['Program Management','Mission Integration','Systems Engineering','Business Operations',
  'Salesforce Implementation','S&OP','Solutions Engineering','Space Mission Operations'];
const OWNER_LEVEL = 3;   // targets Senior IC / Manager band (10+ yrs experience)
function seniorityOf(title){
  const t=(title||'').toLowerCase();
  if(/\b(intern|co-?op|fellow)\b/.test(t)) return 0;
  if(/\b(associate|entry|jr\.?|junior|new ?grad|university)\b/.test(t)) return 1;
  if(/\b(vp|vice president|chief|cxo)\b/.test(t)) return 6;
  if(/\b(director|head of)\b/.test(t)) return 5;
  if(/\b(lead|principal|staff)\b/.test(t)) return 4;
  if(/\b(manager|mgr|sr\.?|senior|iii)\b/.test(t)) return 3;
  return 2;   // mid-level default
}
const DEALBREAKERS=[
  {re:/active (top secret|ts\/sci|secret|security) clearance/i, label:'Active security clearance required', penalty:20},
  {re:/must (currently )?(hold|possess) (a |an )?(active )?(dod )?clearance/i, label:'Active clearance required', penalty:18},
  {re:/\bA(&|and )?P license\b|airframe and powerplant/i, label:'A&P license required', penalty:15},
  {re:/\bP\.?E\.? license\b|professional engineer license/i, label:'PE license required', penalty:15},
  {re:/\bCDL\b/, label:"Commercial driver's license required", penalty:15},
];
function relocationSignal(text){
  const t=(text||'').toLowerCase(); let bonus=0;
  if(/relocation (assistance|package|offered|provided|support)/.test(t)) bonus+=6;
  if(/visa sponsorship|sponsor(s|ship)? visas?/.test(t)) bonus+=6;
  if(/(temporary|corporate) housing|housing stipend/.test(t)) bonus+=4;
  return bonus;
}
// Learned preference: a tiny bag-of-words model built from what you save vs. dismiss.
const STOPWORDS=new Set(['the','and','for','with','of','a','an','to','in','on','at','is','are','ii','iii','sr','jr']);
function wordsOf(s){ return (s||'').toLowerCase().replace(/[^a-z0-9 ]/g,' ').split(/\s+/).filter(w=>w.length>2 && !STOPWORDS.has(w)); }
function learnedPreferenceNudge(j){
  let saved={},dismissed={};
  try{ saved=JSON.parse(localStorage.getItem('orbital.savedMeta')||'{}'); }catch(e){}
  try{ dismissed=JSON.parse(localStorage.getItem('orbital.dismissedMeta')||'{}'); }catch(e){}
  const sVals=Object.values(saved), dVals=Object.values(dismissed);
  if(!sVals.length && !dVals.length) return 0;
  const freq={};
  sVals.forEach(m=>wordsOf(m.title+' '+m.company).forEach(w=>freq[w]=(freq[w]||0)+1));
  dVals.forEach(m=>wordsOf(m.title+' '+m.company).forEach(w=>freq[w]=(freq[w]||0)-1));
  const jw=wordsOf(j.title+' '+j.company);
  let score=0; jw.forEach(w=>{ if(freq[w]) score+=freq[w]; });
  return Math.max(-6,Math.min(6,score));
}
// Persist the match cache to localStorage so it survives full page reloads (Improvement #4)
// — otherwise every reload re-scores every job from scratch. Bounded to 800 entries.
function _loadMatchCache(){ try{ const raw=JSON.parse(localStorage.getItem('orbital.matchCache')||'{}'); Object.entries(raw).forEach(([id,v])=>_matchCache.set(id,v)); }catch(e){} }
function _persistMatchCache(){ try{ const obj={}; let n=0; for(const [k,v] of _matchCache){ if(n++>800) break; obj[k]=v; } localStorage.setItem('orbital.matchCache', JSON.stringify(obj)); }catch(e){} }
const _matchCache=new Map();
_loadMatchCache();
function clearMatchCache(){ _matchCache.clear(); localStorage.removeItem('orbital.matchCache'); }
function enhanceMatch(j){
  const hit=_matchCache.get(j.id);
  if(hit){ j.match=hit.match; j.matchFlags=hit.flags; j.matchBreakdown=hit.bd; return j; }
  const text=(j.title||'')+' '+(j.description||'');
  let score=j.match||0, bd={base:score};
  if(j.description && j.description.length>30){
    let s=30; const low=text.toLowerCase();
    (OWNER.skills||[]).forEach(sk=>{ if(low.includes(sk.toLowerCase())) s += OWNER.coreSkills.includes(sk)?8:4; });
    s=Math.min(100,s);
    score=Math.round((score+s)/2); bd.skillReweight=s;
  }
  const lvl=seniorityOf(j.title), delta=Math.abs(lvl-OWNER_LEVEL);
  const seniorityAdj = delta===0?6 : delta===1?0 : -(delta*6);
  score+=seniorityAdj; bd.seniorityAdj=seniorityAdj; bd.seniorityLevel=lvl;
  let flags=[], dbPenalty=0;
  DEALBREAKERS.forEach(db=>{ if(db.re.test(text)){ score-=db.penalty; dbPenalty-=db.penalty; flags.push(db.label); } });
  bd.dealbreakerPenalty=dbPenalty;
  const relo=relocationSignal(text); score+=relo; bd.relocationBonus=relo;
  const nudge=learnedPreferenceNudge(j); score+=nudge; bd.learnedNudge=nudge;
  const final=Math.max(5,Math.min(100,Math.round(score)));
  j.match=final; j.matchFlags=flags; j.matchBreakdown=bd;
  _matchCache.set(j.id,{match:final,flags,bd});
  if(_matchCache.size % 15 === 0) _persistMatchCache();   // batched write, not on every single job
  return j;
}

function wmoToIconCond(code){
  if(code===0) return ['☀️','Clear skies'];
  if([1,2].includes(code)) return ['🌤️','Mostly clear'];
  if(code===3) return ['⛅','Partly cloudy'];
  if([45,48].includes(code)) return ['🌫️','Foggy'];
  if([51,53,55,56,57].includes(code)) return ['🌦️','Drizzle'];
  if([61,63,65,66,67,80,81,82].includes(code)) return ['🌧️','Rain'];
  if([71,73,75,77,85,86].includes(code)) return ['❄️','Snow'];
  if([95,96,99].includes(code)) return ['⛈️','Thunderstorms'];
  return ['🌡️','—'];
}
async function fetchLiveWeather(key){
  const c=WX_COORDS[key]; if(!c) return;
  try{
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${c.lat}&longitude=${c.lon}&current=temperature_2m,weather_code&daily=temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&timezone=auto`;
    const r=await fetch(url); if(!r.ok) throw new Error('HTTP '+r.status);
    const d=await r.json();
    const [icon,cond]=wmoToIconCond(d.current.weather_code);
    WX_LIVE[key]={ place:c.place, icon, cond, temp:Math.round(d.current.temperature_2m)+'°F',
      hi:Math.round(d.daily.temperature_2m_max[0])+'°', lo:Math.round(d.daily.temperature_2m_min[0])+'°' };
  }catch(e){ WX_LIVE[key]={ place:c.place, error:true }; }
  render();
}
function ensureWeatherLoaded(region){
  const key = WX_COORDS[region] ? region : 'global';
  if(!WX_LIVE.home) fetchLiveWeather('home');
  if(!WX_LIVE[key]) fetchLiveWeather(key);
}

// AI semantic re-score — reads the REAL posting text + real résumé summary through Claude
// for a second, semantic opinion alongside the transparent keyword-based match score.
async function runAiReScore(id){
  const j = findJobById(id); if(!j) return;
  const box = document.getElementById('airescore-'+id); if(!box) return;
  box.style.display='block';
  box.innerHTML = `<h4>🧠 AI Semantic Re-Score</h4><p class="subtle" style="margin:0">Reading the full posting against your résumé…</p>`;
  try{
    const resumeText = (OWNER.blurb||'') + ' Skills: ' + (OWNER.skills||[]).join(', ');
    const desc = (j.description||'').slice(0,3000);
    const prompt = `You are helping a candidate assess real job fit. Candidate background: """${resumeText}""" \n\nJob posting — ${j.title} at ${j.company}: """${desc || j.title}"""\n\nRespond with EXACTLY three lines, no extra text:\nSCORE: <0-100 integer>\nVERDICT: <one short sentence — genuine strengths AND gaps>\nWATCHOUT: <one real risk or mismatch to be aware of, or "None obvious">`;
    const text = await window.claude.complete(prompt);
    const scoreM = text.match(/SCORE:\s*(\d{1,3})/i);
    const verdictM = text.match(/VERDICT:\s*(.+)/i);
    const watchM = text.match(/WATCHOUT:\s*(.+)/i);
    const score = scoreM ? Math.max(0,Math.min(100,+scoreM[1])) : null;
    box.innerHTML = `<h4>🧠 AI Semantic Re-Score</h4>
      ${score!=null ? `<p style="margin:0 0 6px;font-size:1.1rem;font-weight:700;color:${matchColor(score)}">${score}% semantic fit</p>` : ''}
      <p style="margin:0 0 6px;font-size:.86rem;color:#cfdcec">${esc(verdictM?verdictM[1]:text.slice(0,300))}</p>
      ${watchM?`<p style="margin:0;font-size:.8rem;color:var(--gold)">⚠ ${esc(watchM[1])}</p>`:''}
      <p class="subtle" style="margin-top:8px;font-size:.68rem">Semantic read from the full posting — a second opinion alongside (not a replacement for) the ${j.match}% keyword-based match above.</p>`;
  }catch(e){
    box.innerHTML = `<h4>🧠 AI Semantic Re-Score</h4><p class="subtle" style="color:var(--bad)">Couldn't complete the AI re-score right now (${esc(e.message||'unknown error')}). Try again in a moment.</p>`;
  }
}

  const DENS={spacious:[1.18,1.06],standard:[1,1],command:[0.74,0.93]};

async function initData(){
  // decide mode
  const wantLive = settings.dataSource==='live' || (settings.dataSource==='auto' && SB_URL && SB_KEY);
  if(wantLive && SB_URL && SB_KEY){
    try{
      sb = window.supabase.createClient(SB_URL, SB_KEY);
      const q = sb.from('jobs').select('*').limit(2000);
      const {data,error} = await Promise.race([q, new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),6000))]);
      if(error) throw error;
      liveJobs = data||[];
      dataMode = 'live';
      _sigCache.clear();   // stale internship-signal cache would misreport after a refresh
      return;
    }catch(e){ console.warn('Live fetch failed, falling back to sample:', e.message); }
  }
  dataMode = (settings.dataSource==='live') ? 'live' : 'sample';
}
function jobsForRegion(){
  // sample mode → curated JOBS; live mode → map supabase rows
  let base;
  if(dataMode==='live'){
    base = (liveJobs||[]).map(r=>enhanceMatch(mapLiveJob(r)));
  } else {
    base = JOBS.map(j=>enhanceMatch(j));
  }
  const out = base.filter(j=>{
    if(!j.live && !spaceQualifies(j)) return false;   // sample rows: client gate; live rows: already server-gated
    if(!showArchived && isArchived(j)) return false;   // hide roles ≥90 days old
    if(region!=='global' && j.region!==region) return false;
    if(track==='intern' && j.type!=='Internship') return false;
    if(track==='fulltime' && j.type==='Internship') return false;
    if(track==='earlycareer' && !isEarlyCareer(j)) return false;
    if((j.match||0) < settings.matchFloor && !(j.live && (j.type==='Internship'||track==='earlycareer'))) return false;   // live internships / early-career view are exempt from the floor
    if(companyFilter && j.company!==companyFilter) return false;
    if(query){
      const hay=`${j.company} ${j.title} ${j.location} ${(j.tech||[]).join(' ')}`.toLowerCase();
      if(!hay.includes(query)) return false;
    }
    return true;
  });
  // Live mode shows ONLY real Supabase rows. If the table is empty, the UI says "No Data" —
  // it must NEVER mask an unpopulated database with demo/sample roles.
  dataFallback = false;
  return out;
}
// Tally roles-per-company from the ACTUAL shown rows (ignoring any active company filter),
// so the "Top Hiring Companies" chart matches what you get when you click a company.
function liveCompanyTally(){
  const savedCF=companyFilter; companyFilter='';
  let rows; try{ rows=jobsForRegion(); } finally { companyFilter=savedCF; }
  const m={};
  rows.forEach(j=>{ if(j.company) m[j.company]=(m[j.company]||0)+1; });
  return Object.entries(m).sort((a,b)=>b[1]-a[1]);
}
function liveRoleDemand(){
  // Real demand tally derived from the ACTUAL loaded roles (title categories), replacing
  // the old hardcoded ROLE_DEMAND numbers. Falls back to the static list only when there is
  // no live data at all (sample/demo mode).
  if(dataMode!=='live') return ROLE_DEMAND[region]||ROLE_DEMAND.la;
  const savedCF=companyFilter; companyFilter='';
  let rows; try{ rows=jobsForRegion(); } finally { companyFilter=savedCF; }
  const CATS=[
    ['Technical Program Manager',/\b(technical program|tpm)\b/i],
    ['Mission Integration Mgr',/mission integration/i],
    ['Business Operations',/business operations/i],
    ['Solutions Architect',/solutions? (architect|engineer)/i],
    ['Launch Operations Lead',/launch operations/i],
    ['Systems Engineer',/systems? engineer/i],
    ['Program Manager',/\bprogram manager\b/i],
    ['Supply Chain / Procurement',/supply chain|procurement/i],
  ];
  const tally=CATS.map(([label,re])=>[label, rows.filter(j=>re.test(j.title||'')).length]).filter(([,n])=>n>0);
  tally.sort((a,b)=>b[1]-a[1]);
  return tally.length ? tally : (ROLE_DEMAND[region]||ROLE_DEMAND.la);
}
function topCompaniesData(){
  if(dataMode==='live'){ const t=liveCompanyTally(); if(t.length) return t; }
  return COMPANIES[region]||COMPANIES.global;
}
function hubToRegion(r){
  // Robust region resolution — never silently drop a real row to 'global' just because
  // location_hub wasn't an exact token. Accepts case/spacing variants, then falls back to
  // parsing the free-text location so regional tabs + scatterplots actually populate.
  const raw=(r.location_hub||'').toString().trim().toUpperCase().replace(/[\s\-]+/g,'_');
  const map={SEATTLE:'seattle', PUGET_SOUND:'seattle', GREATER_LA:'la', LA:'la', LOS_ANGELES:'la', SOCAL:'la', NEW_ZEALAND:'nz', NZ:'nz'};
  if(map[raw]) return map[raw];
  const loc=(r.location||'').toLowerCase();
  if(/seattle|redmond|kent|renton|bellevue|tukwila|auburn|everett|bothell|kirkland|tacoma|washington|\bwa\b/.test(loc)) return 'seattle';
  // Real LA-metro cities only — a bare "california"/"ca" match used to lump Bay Area
  // roles (San Francisco, Palo Alto, Golden CO w/ SF option, etc.) into Greater LA.
  const LA_METRO=/los angeles|hawthorne|el segundo|long beach|torrance|irvine|pasadena|van nuys|culver city|santa monica|redondo beach|manhattan beach|inglewood|burbank|glendale|anaheim|orange county|santa clarita|palmdale|lancaster,\s*ca/;
  const NORCAL=/san francisco|bay area|oakland|san jose|palo alto|mountain view|sunnyvale|berkeley|redwood city|menlo park|santa clara|silicon valley|sacramento/;
  if(LA_METRO.test(loc)) return 'la';
  if(!NORCAL.test(loc) && /california|\bca\b/.test(loc)) return 'la';   // generic CA fallback, only if not clearly NorCal
  if(/new zealand|auckland|christchurch|wellington|mahia|m\u0101hia|warkworth|\bnz\b/.test(loc)) return 'nz';
  return 'global';
}
function mapLiveJob(r){
  let salMin=+r.salary_min||0, salMax=+r.salary_max||0;
  if((!salMin||!salMax) && r.salary_range){const n=String(r.salary_range).replace(/,/g,'').match(/\d{4,7}/g);if(n){salMin=salMin||+n[0];salMax=salMax||(n[1]?+n[1]:+n[0]);}}
  const region=hubToRegion(r);
  const match = r.match ?? r.match_score ?? 75;
  const isIntern = !!r.is_intern || r.type==='Internship';
  // Salary estimate fallback — many live board rows omit pay, which would drop them from
  // the salary scatter. Derive a credible band from seniority + region so charts populate.
  let estimated=false;
  if(!isIntern && !salMax){
    const t=(r.title||'').toLowerCase();
    const regBase={seattle:140000, la:150000, nz:115000}[region]||140000;
    const sf = /director|head|principal|lead|senior|sr\.?|manager/.test(t)?1.18 : /associate|junior|jr\.?|coordinator|i\b/.test(t)?0.82 : 1.0;
    salMin=Math.round(regBase*sf*0.88/1000)*1000;
    salMax=Math.round(regBase*sf*1.16/1000)*1000;
    estimated=true;
  }
  return {
    id:r.id, company:r.company, title:r.title, region,
    salMin, salMax, internRate:r.intern_rate||0, internWeeks:r.intern_weeks||0,
    match, planets: r.planets!=null ? r.planets : Math.max(0,Math.min(5,Math.round(match/20))),
    days: r.posting_age!=null ? r.posting_age : 0,
    location: r.location || r.location_hub || '', type: isIntern?'Internship':(r.type||'Full-time'),
    logo:(r.company||'?').replace(/[^A-Za-z]/g,'').slice(0,2).toUpperCase()||'JB', logoBg:r.logo_bg||'#2a4d7a',
    tech:(r.tech||'').toString().split(',').map(s=>s.trim()).filter(Boolean),
    demand:r.demand ?? match, clearance:r.clearance||'NONE', estimated,
    reloc:r.relocation_note || (r.relocation_flag?'Relocation offered':'—'),
    url:r.url || r.apply_url, description:r.description,
    live:!!r.source   // ANY scraper-sourced row is server-gated (greenhouse/lever/workday/ashby/amazon/custom). Don't re-filter through the client space gate or match floor.
  };
}

// Procedural "generative AI art" nebula — real-time SVG turbulence/color-matrix noise,
// computed live in the browser (never a static stock image), tinted from the brand
// palette (electric blue / violet / magenta) so it feels bespoke to Orbital, not stock.
// Each call gets a unique seed so hero/vault/dossier instances never look identical.
let _nebulaSeed = 1;
function generativeNebula(tag){
  const seed = (_nebulaSeed++ % 97) + 3;
  const id = 'neb-' + tag + '-' + seed;
  return `<svg class="gen-nebula" aria-hidden="true" width="100%" height="100%" preserveAspectRatio="xMidYMid slice" style="position:absolute;inset:0;z-index:0;mix-blend-mode:screen;opacity:.85;transition:transform .4s ease-out">
    <defs>
      <filter id="${id}" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence type="fractalNoise" baseFrequency="0.006 0.011" numOctaves="4" seed="${seed}" result="noise">
          <animate attributeName="baseFrequency" dur="38s" values="0.006 0.011;0.009 0.007;0.006 0.011" repeatCount="indefinite"/>
        </feTurbulence>
        <feColorMatrix in="noise" type="matrix" values="
          0 0 0 0 0.14
          0 0 0 0 0.55
          0 0 0 0 0.72
          0 0 0 0.9 0"/>
        <feComponentTransfer><feFuncA type="gamma" amplitude="1" exponent="2.4" offset="0"/></feComponentTransfer>
      </filter>
      <radialGradient id="${id}-tint" cx="30%" cy="25%" r="75%">
        <stop offset="0%" stop-color="#ff4d6d" stop-opacity=".55"/>
        <stop offset="45%" stop-color="#9d6bff" stop-opacity=".35"/>
        <stop offset="100%" stop-color="#04060c" stop-opacity="0"/>
      </radialGradient>
    </defs>
    <rect width="100%" height="100%" filter="url(#${id})"/>
    <rect width="100%" height="100%" fill="url(#${id}-tint)"/>
  </svg>`;
}
// Mobile "tilt" parallax — phone gyroscope gently shifts every nebula layer, so the
// generative-art backdrop feels alive/dimensional on mobile too, not just desktop hover.
let _tiltWired=false;
function wireTiltParallax(){
  if(_tiltWired || typeof window==='undefined') return; _tiltWired=true;
  const apply=(x,y)=>{ document.querySelectorAll('.gen-nebula').forEach(s=>{ s.style.transform=`translate(${x}px,${y}px) scale(1.06)`; }); };
  let raf=null;
  window.addEventListener('deviceorientation', e=>{
    if(raf) return; raf=requestAnimationFrame(()=>{ raf=null;
      const x=Math.max(-14,Math.min(14,(e.gamma||0)*0.6));
      const y=Math.max(-14,Math.min(14,((e.beta||0)-45)*0.3));
      apply(x,y);
    });
  }, true);
  // iOS 13+ requires a user gesture to grant motion permission — request on first tap.
  if(typeof DeviceOrientationEvent!=='undefined' && typeof DeviceOrientationEvent.requestPermission==='function'){
    const grant=()=>{ DeviceOrientationEvent.requestPermission().catch(()=>{}); document.removeEventListener('touchend',grant); };
    document.addEventListener('touchend',grant,{once:true});
  }
}

let NEWS_LIVE = null;   // null = not yet loaded; [] = loaded but empty; array = real articles
async function fetchLiveNews(){
  try{
    const r = await fetch('https://api.spaceflightnewsapi.net/v4/articles/?limit=6&ordering=-published_at');
    if(!r.ok) throw new Error('HTTP '+r.status);
    const d = await r.json();
    NEWS_LIVE = (d.results||[]).map(a=>({
      tag: (a.news_site||'NEWS').toUpperCase(), hot:0,
      title: a.title, src: a.news_site,
      time: (()=>{ try{ const hrs=Math.max(0,Math.round((Date.now()-new Date(a.published_at))/3600000)); return hrs<24 ? hrs+'h ago' : Math.round(hrs/24)+'d ago'; }catch(e){ return ''; } })(),
      img: a.image_url, url: a.url,
    }));
  }catch(e){ NEWS_LIVE = 'error'; }
  render();
}

function coverFor(reqSkill){
  const own=OWNER.skills.map(s=>s.toLowerCase());
  const r=reqSkill.toLowerCase();
  const direct=[
    ['program management','program management'],['mission integration','mission integration'],
    ['systems engineering','space mission'],['business operations','business operations'],
    ['process automation','process automation'],['s&op','s&op'],['salesforce','salesforce'],
    ['crm','crm'],['stakeholder','stakeholder'],['p&l','p&l'],['risk','risk'],['mission assurance','mission assurance'],
    ['cross-functional','stakeholder'],['roadmap','pipeline'],['go-to-market','startup'],['product strategy','solutions'],
    ['requirements management','lifecycle'],['agile','agile'],['ci/cd','process automation'],['data analytics','kpi'],
    ['stakeholder communication','stakeholder'],['stakeholder management','stakeholder'],['problem solving','root cause'],
  ];
  for(const [k,needle] of direct){ if(r.includes(k) && own.some(s=>s.includes(needle))) return {lvl:'direct',note:'Proven, direct experience'}; }
  // transferable (operations-adjacent or lightly held)
  const transfer=['sql','analytics','statistical','a/b','prototyp','roadmap','go-to-market','cloud','aws','distributed','modeling','simulation','python','requirements'];
  if(transfer.some(t=>r.includes(t))) return {lvl:'transfer',note:'Adjacent / transferable from ops & solutions work'};
  // hard technical gaps
  return {lvl:'gap',note:'Stretch — frame via systems/ops leadership, not hands-on build'};
}
function archetypeFor(j){
  const t=(j.title||'').toLowerCase();
  for(const a of Object.values(ARCHETYPES)){ if(a.key.some(k=>t.includes(k))) return a; }
  return ARCHETYPES.ops;
}
function skillsMatch(j){
  const arch=archetypeFor(j);
  const rows=arch.req.map(([skill,weight])=>({skill,weight,...coverFor(skill)}));
  const totW=rows.reduce((a,r)=>a+r.weight,0);
  const gotW=rows.reduce((a,r)=>a+r.weight*(r.lvl==='direct'?1:r.lvl==='transfer'?0.5:0),0);
  const coverage=Math.round(gotW/totW*100);
  const direct=rows.filter(r=>r.lvl==='direct').length;
  const gaps=rows.filter(r=>r.lvl==='gap');
  return {rows,coverage,direct,gaps,total:rows.length,blended:Math.round(coverage*0.55+(j.match||75)*0.45)};
}
function matchColor(p){ return p>=85?'#37e0a0':p>=70?'#37d6e6':p>=55?'#f5c560':'#ff6f86'; }
// Redundant icon+color encoding (not color alone — hard to distinguish with astigmatism/color
// vision deficiency): ✓ strong fit, ● decent, ⚠ marginal, ✕ weak.
function matchIcon(p){ return p>=85?'✓':p>=70?'●':p>=55?'⚠':'✕'; }
/* strategic role-tag engine — computable signal chips for advantage */
const COMPANY_TIER={
  'SpaceX':'Late-stage','Blue Origin':'Bezos-backed','Rocket Lab':'Public','Boeing':'Prime','Amazon':'Public',
  'Relativity Space':'Series F','Impulse Space':'Series B','Vast Space':'Founder-backed','Stoke Space':'Series B',
  'Riot Games':'Public','Snap Inc.':'Public','Xero':'Public','Datacom':'Private','Anduril':'Late-stage',
};
function roleTags(j){
  const t=(j.title||'').toLowerCase(), co=j.company||'', tags=[];
  const tier=COMPANY_TIER[co];
  if(tier) tags.push({k:tier, c:'#9d6bff', tip:'Funding / company stage'});
  if(/integrat|mission|program|s&op|operations|supply/.test(t)) tags.push({k:'Integration', c:'#37d6e6', tip:'Cross-functional / supply-chain leverage — your wheelhouse'});
  if(/defense|avionics|guidance|propuls|payload|gnc|structures/.test(t)) tags.push({k:'Regulated', c:'#f5c560', tip:'ITAR / FAA / FCC exposure — clearance or compliance edge'});
  if(['SpaceX','Rocket Lab','Relativity Space','Impulse Space','Stoke Space','Blue Origin'].includes(co)) tags.push({k:'SpaaS', c:'#37e0a0', tip:'Space-as-a-service / launch cadence company'});
  if(isHot(j)) tags.push({k:'High velocity', c:'#ff6f86', tip:'Posted ≤7 days — move fast'});
  if(/lead|senior|director|principal|manager/.test(t)) tags.push({k:'Full-lifecycle', c:'#5b8cff', tip:'Owns end-to-end — matches your 10-yr operator profile'});
  return tags;
}
function roleTagChips(j,inline){
  const tags=roleTags(j); if(!tags.length) return '';
  return tags.map(t=>`<span class="rtag" title="${esc(t.tip)}" style="--rt:${t.c}">${esc(t.k)}</span>`).join('');

function lifestyleFit(j){
  const floor=targetSalary(); const sal=salaryValue(j);
  if(!sal) return {ok:null,txt:'Compensation not disclosed — confirm against your '+money(floor)+' lifestyle floor.'};
  const delta=Math.round((sal/floor-1)*100);
  return {ok:sal>=floor, delta, txt: sal>=floor
    ? `Clears your ${money(floor)} lifestyle floor by ${delta}% — sustains the 4-dog detached-home standard with margin.`
    : `Sits ${Math.abs(delta)}% under your ${money(floor)} lifestyle floor — would compress the detached-home + savings target.`};
}
/* ATS Keyword Delta — JD competencies vs my resume bank; flags what to weave in */
function atsDelta(j){
  const bank = (OWNER.skills||[]).map(s=>s.toLowerCase());
  const jd = [...(j.tech||[]), ...(JD_KEYWORDS[archetypeFor(j).id]||[])];
  const seen=new Set(); const have=[], missing=[];
  jd.forEach(k=>{
    const kl=k.toLowerCase(); if(seen.has(kl))return; seen.add(kl);
    const hit = bank.some(b=>b.includes(kl)||kl.includes(b));
    (hit?have:missing).push(k);
  });
  const parse = jd.length ? Math.round(have.length/jd.length*100) : 100;
  return {have, missing, parse};
}
function atsBlock(j){
  const a=atsDelta(j); const col=matchColor(a.parse);
  return `<div class="dblock"><h4>🔑 ATS Keyword Delta <span style="color:${col};font-family:'JetBrains Mono'">${a.parse}% parse</span></h4>
    <p style="margin:0 0 10px;font-size:.82rem;color:var(--muted)">What an applicant-tracking bot scans for in this posting — make sure every term it wants is on your resume before you submit.</p>

}

// inline list-filter state + helpers
const listFilters = { region:'all', type:'all', reloc:'all', sort:'match', q:'', itar:'all', clearance:'all', track:'all' };
function applyListFilters(jobs){
  let a=jobs.filter(j=>{
    if(region==='global' && listFilters.region!=='all' && j.region!==listFilters.region) return false;
    if(listFilters.type==='Full' && j.type==='Internship') return false;
    if(listFilters.type==='Internship' && j.type!=='Internship') return false;
    if(listFilters.reloc==='yes' && (!j.reloc||j.reloc==='—')) return false;
    if(j.type==='Internship' && (listFilters.itar!=='all' || listFilters.clearance!=='all' || listFilters.track!=='all')){
      const s=internshipSignals(j);
      if(listFilters.itar==='no' && s.itar) return false;
      if(listFilters.itar==='yes' && !s.itar) return false;
      if(listFilters.clearance==='no' && s.clearance) return false;
      if(listFilters.clearance==='yes' && !s.clearance) return false;
      if(listFilters.track!=='all' && s.track!==listFilters.track) return false;
    }
    if(listFilters.q){ const h=`${j.company} ${j.title} ${j.location} ${(j.tech||[]).join(' ')}`.toLowerCase(); if(!h.includes(listFilters.q.toLowerCase())) return false; }
    return true;
  });
  const s=listFilters.sort;
  a.sort((x,y)=> s==='deadline'?effectiveDeadline(x)-effectiveDeadline(y)
    : s==='startdate'?effectiveStartDate(x)-effectiveStartDate(y)
    : s==='fresh'?daysOnMarket(x)-daysOnMarket(y)
    : s==='payhi'?salaryValue(y)-salaryValue(x)
    : s==='paylo'?((salaryValue(x)||1e9)-(salaryValue(y)||1e9))
    : (y.match||0)-(x.match||0));
  return a;
}
// Real parsed deadline when the posting states one; otherwise the 45-day-posting estimate
// used elsewhere in the app (posting date + 45 days). Returns a millisecond timestamp so it
// sorts cleanly — soonest deadline first.
function effectiveDeadline(j){
  if(j.type==='Internship'){
    const sig=internshipSignals(j);
    if(sig.deadline) return sig.deadline.date.getTime();
  }
  return Date.now() + Math.max(0,45-daysOnMarket(j))*86400000;
}
// Real parsed program start date; falls back to "far future" so unknown-start roles sort last.
function effectiveStartDate(j){
  if(j.type==='Internship'){
    const sig=internshipSignals(j);
    if(sig.startDate) return sig.startDate.getTime();
  }
  return Infinity;
}

function barsPanel(title,data,va){

  const clearBtn = (isCo && companyFilter) ? `<span class="va clearco" id="clearCo">✕ ${esc(companyFilter)}</span>` : (va?`<span class="va">${va}</span>`:'');

// Diegetic "targeting reticle" viz — top companies plotted as a radar/lock-on ring instead
// of plain horizontal bars, distance-from-center encoding hiring volume. Same click-to-filter
// behavior as before (data-cofilter), so nothing functional changes — just the visual language.
function radialCompanyRing(title,data,clearBtn){
  const top = data.slice(0,7);
  // A radar shape needs enough points to form a real polygon — with 1-2 companies it's just
  // an empty circle wasting space. Fall back to compact bars for sparse regions (e.g. NZ),
  // AND always in Readable Mode (thin radar rings/tiny labels are hard with astigmatism).
  if(top.length<3 || settings.readableMode){
    const max=Math.max(...top.map(d=>d[1]),1);
    const rows=top.map(([n,v])=>`<div class="hbar" data-cofilter="${esc(n)}" style="cursor:pointer"><div class="nm">${esc(n)}</div><div class="tk"><i style="width:${(v/max*100).toFixed(0)}%"></i></div><div class="ct">${v.toLocaleString()}</div></div>`).join('');
    return `<div class="panel"><div class="ph"><h3>${title}</h3>${clearBtn}</div><div class="pb"><div class="hbars">${rows||'<p class="subtle">No hiring data yet for this region.</p>'}</div></div></div>`;
  }
  const max = Math.max(...top.map(d=>d[1]), 1);
  const cx=110, cy=110, R=86;
  const n = top.length;
  const rings=[1,0.75,0.5,0.25].map(f=>`<circle cx="${cx}" cy="${cy}" r="${R*f}" fill="none" stroke="rgba(55,214,230,.16)" stroke-dasharray="${f===1?'0':'2 4'}"/>`).join('');
  const spokes = top.map((_,i)=>{ const a=(-90+i*360/n)*Math.PI/180; return `<line x1="${cx}" y1="${cy}" x2="${cx+R*Math.cos(a)}" y2="${cy+R*Math.sin(a)}" stroke="rgba(55,214,230,.10)"/>`; }).join('');
  const pts = top.map(([n2,v],i)=>{ const a=(-90+i*360/n)*Math.PI/180; const r=R*(0.22+0.78*v/max); return {x:cx+r*Math.cos(a), y:cy+r*Math.sin(a), a, n:n2, v}; });
  const poly = pts.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const dots = pts.map(p=>`<g class="rr-dot" data-cofilter="${esc(p.n)}" style="cursor:pointer">
      <circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="15" fill="transparent"/>
      <circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="5.5" fill="var(--a4)" stroke="#0b1019" stroke-width="2"/>
    </g>`).join('');
  const labels = pts.map((p,i)=>{ const lx=cx+(R+20)*Math.cos(p.a), ly=cy+(R+20)*Math.sin(p.a);
    return `<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" text-anchor="middle" dominant-baseline="middle" font-size="8" fill="#8a9ab2" style="font-family:'JetBrains Mono',monospace">${esc(p.n.split(' ')[0])}</text>`; }).join('');
  return `<div class="panel"><div class="ph"><h3>${title}</h3>${clearBtn}</div><div class="pb" style="display:flex;flex-direction:column;align-items:center">
    <svg viewBox="0 0 220 220" width="100%" style="max-width:280px;overflow:visible">
      ${rings}${spokes}
      <polygon points="${poly}" fill="rgba(255,77,109,.14)" stroke="var(--a4)" stroke-width="1.5"/>
      ${dots}${labels}
      <circle cx="${cx}" cy="${cy}" r="3" fill="var(--a3)"/>
    </svg>
    <p class="subtle" style="margin:8px 2px 0;font-size:.72rem;text-align:center">Distance from center = roles hiring. Click a node to lock on that company.</p>
  </div></div>`;
}

function skillRankPanel(){
  // market demand list (name + demand index)
  const market = (region==='global'
    ? [['Program Management',9200],['Systems Engineering',8600],['Mission Integration',7400],['Python',7100],['Stakeholder Management',6800],['Process Automation',6200],['S&OP',5400],['Salesforce / CRM',5000],['Risk Management',4700],['Data Analysis',4200]]
    : [['Program Management',3200],['Systems Engineering',2900],['Mission Integration',2400],['Stakeholder Management',2100],['Process Automation',1800],['S&OP',1500],['Salesforce / CRM',1300],['Mission Assurance',1100],['Python',1000],['Contract Negotiation',820]]);
  const bank = OWNER.skills.map(s=>s.toLowerCase());
  const max = market[0][1];
  const rows = market.map((d,i)=>{
    const [name,demand]=d;
    const nl=name.toLowerCase();
    const have = bank.some(b=>b.includes(nl)||nl.includes(b)|| nl.split(' ')[0]===b.split(' ')[0]);
    const myRank = have ? bank.findIndex(b=>b.includes(nl)||nl.includes(b)||nl.split(' ')[0]===b.split(' ')[0])+1 : null;
    return `<div class="srow">
      <div class="srank">#${i+1}</div>
      <div class="sname">${esc(name)}</div>
      <div class="stk"><i style="width:${Math.round(demand/max*100)}%"></i></div>
      <div class="sdem">${demand.toLocaleString()}</div>
      <div class="syou ${have?'have':'gap'}">${have?`✓ You rank it #${myRank}`:'✗ Not on profile'}</div>
    </div>`;
  }).join('');
  const covered = market.filter(d=>{const nl=d[0].toLowerCase();return bank.some(b=>b.includes(nl)||nl.includes(b)||nl.split(' ')[0]===b.split(' ')[0]);}).length;
  const pct = Math.round(covered/market.length*100);
  return `<div class="panel"><div class="ph"><h3>📊 In-Demand Skills vs. Your Profile</h3><span class="va" style="color:${matchColor(pct)}">${pct}% coverage</span></div>
    <div class="pb">
      <p class="subtle" style="margin:0 0 12px">The market's most-wanted skills in ${esc(REGIONS[region].short)}, side by side with where they sit in your profile. You cover <b style="color:${matchColor(pct)}">${covered} of the top ${market.length}</b> — lean into those, and weave the gaps into your resume.</p>
      <div class="srow shead"><div class="srank">Rank</div><div class="sname">Skill</div><div class="stk">Market demand</div><div class="sdem"></div><div class="syou">Your standing</div></div>
      ${rows}
    </div></div>`;
}

/* =====================================================================================
   ALUMNI NETWORK — a real warm-intro tracker. LinkedIn blocks automated scraping, so this
   is NOT a live alumni database; it's (1) a directory you log alumni contacts into, keyed
   to the companies you're targeting, and (2) a working LinkedIn search deep-link so you
   can actually FIND those alumni in seconds instead of guessing.
   ===================================================================================== */
const ALUMNI_STATUSES=['Not contacted','Messaged','Responded','Intro made'];
function getAlumni(){ try{ return JSON.parse(localStorage.getItem('orbital.alumni')||'[]'); }catch(e){ return []; } }
function saveAlumni(list){ localStorage.setItem('orbital.alumni', JSON.stringify(list)); }
function alumniForCompany(company){ return getAlumni().filter(a=>(a.company||'').toLowerCase()===(company||'').toLowerCase()); }
function alumniSearchUrl(company){
  return 'https://www.linkedin.com/search/results/people/?keywords=' + encodeURIComponent('"Embry-Riddle" '+(company||''));
}
function addAlumniContact(name,company,title,linkedinUrl,relationship){
  if(!canEdit()) return guestBlock();
  if(!name || !company) return;
  const list=getAlumni();
  list.unshift({id:'al'+Date.now(), name, company, title:title||'', linkedinUrl:linkedinUrl||'', relationship:relationship||'ERAU alum', status:'Not contacted', notes:'', added:new Date().toISOString()});
  saveAlumni(list);
}
function updateAlumniStatus(id,status){ const list=getAlumni(); const c=list.find(x=>x.id===id); if(c){ c.status=status; saveAlumni(list); } }
function deleteAlumniContact(id){ if(!canEdit())return guestBlock(); saveAlumni(getAlumni().filter(x=>x.id!==id)); }

   MISSION COUNTDOWN (live T-minus to next launch)
   ========================================================================= */
let cdTimer, launchTargets={};
// Live "Next Launch" via Launch Library 2 (thespacedevs.com) — free, keyless, real upcoming
// launch data. Cached per-region like the weather panel; no fabricated countdown target.
const LAUNCH_QUERY = { seattle:'Blue Origin', la:'Vandenberg', nz:'Rocket Lab', global:'Falcon 9' };
let MISSIONS_LIVE = {};
async function fetchLiveLaunch(r){
  const q = LAUNCH_QUERY[r] || LAUNCH_QUERY.global;
  try{
    const url = `https://ll.thespacedevs.com/2.3.0/launches/upcoming/?limit=1&search=${encodeURIComponent(q)}`;
    const resp = await fetch(url); if(!resp.ok) throw new Error('HTTP '+resp.status);
    const d = await resp.json();
    const l = (d.results||[])[0];
    if(!l) throw new Error('no upcoming launch found');
    MISSIONS_LIVE[r] = {
      name: l.name || q,
      vehicle: (l.rocket && l.rocket.configuration && l.rocket.configuration.full_name) || '—',
      pad: [(l.pad||{}).name, (l.pad && l.pad.location && l.pad.location.name)].filter(Boolean).join(' · ') || '—',
      payload: (l.mission && l.mission.name) || (l.mission && l.mission.description ? l.mission.description.slice(0,60)+'…' : '—'),
      img: l.image || (PHOTOS[r]||PHOTOS.global),
      net: l.net,   // real T-0 ISO timestamp
      highlights: [
        l.mission && l.mission.type ? 'Mission type: '+l.mission.type : null,
        l.launch_service_provider ? 'Provider: '+l.launch_service_provider.name : null,
        l.probability!=null ? 'Launch probability: '+l.probability+'%' : null,
      ].filter(Boolean),
    };
  }catch(e){ MISSIONS_LIVE[r] = {error:true}; }
  render();
}
function ensureLaunchLoaded(r){ if(!MISSIONS_LIVE[r]) fetchLiveLaunch(r); }
function launchTargetFor(r){
  const live = MISSIONS_LIVE[r];
  if(live && live.net) return new Date(live.net).getTime();
  if(!launchTargets[r]){ const m=MISSIONS[r]||MISSIONS.global; launchTargets[r]=Date.now()+m.offsetH*3600*1000; }
  return launchTargets[r];
}
function startCountdown(){
  clearInterval(cdTimer);
  const tick=()=>{
    const dEl=document.getElementById('cdD'); if(!dEl){ clearInterval(cdTimer); return; }
    let diff=Math.max(0, launchTargetFor(region)-Date.now());
    const d=Math.floor(diff/86400000); diff-=d*86400000;
    const h=Math.floor(diff/3600000); diff-=h*3600000;
    const m=Math.floor(diff/60000); diff-=m*60000;
    const s=Math.floor(diff/1000);
    const p=n=>String(n).padStart(2,'0');
    dEl.textContent=p(d);
    const hEl=document.getElementById('cdH'); if(hEl)hEl.textContent=p(h);
    const mEl=document.getElementById('cdM'); if(mEl)mEl.textContent=p(m);
    const sEl=document.getElementById('cdS'); if(sEl)sEl.textContent=p(s);
  };
  tick(); cdTimer=setInterval(tick,1000);
}

function salaryBreakdownBlock(j){
  const R=REGIONS[j.region]||REGIONS[region];
  const gross=salaryValue(j); if(!gross) return '';
  const reloc=R.reloc||{}; const floor=targetSalary();
  // effective tax estimate per hub
  const taxRate=j.region==='la'?0.093:j.region==='nz'?0.30:0.0;
  const stateTax=Math.round(gross*taxRate);
  const fed=Math.round(gross*0.18);
  const net=gross-stateTax-fed;
  const rentNum=parseInt(String(reloc.rent||'$2200').replace(/[^\d]/g,''))||2200;
  const rentYr=rentNum*12;
  const housingPct=Math.round(rentYr/net*100);
  const leftover=net-rentYr;
  const ok=gross>=floor;
  const bar=(label,val,color)=>`<div class="brk"><span class="bl">${label}</span><div class="btk"><i style="width:${Math.max(4,Math.round(val/gross*100))}%;background:${color}"></i></div><span class="bv">${money(val)}</span></div>`;
  return `<div class="dblock"><h4>💵 Full Salary Breakdown · vs your standard of living</h4>
    <div class="brkwrap">
      ${bar('Gross base (top of range)',gross,'#37e0a0')}
      ${bar('− Est. federal tax (~18%)',fed,'#ff9f5a')}
      ${bar(`− State/income tax (${(taxRate*100).toFixed(1)}%)`,stateTax,'#ff6f86')}
      ${bar('= Take-home (net)',net,'#37d6e6')}
      ${bar('− Annual housing (1BR median)',rentYr,'#9d6bff')}
    </div>
    <div class="brkgrid">
      <div><b>${housingPct}%</b><span>of net to housing ${housingPct<=30?'<i style="color:var(--good)">✓ healthy</i>':'<i style="color:var(--gold)">△ tight</i>'}</span></div>
      <div><b>${money(leftover)}</b><span>net after housing / yr</span></div>
      <div><b style="color:${ok?'var(--good)':'var(--bad)'}">${ok?'✓ Clears':'△ Below'}</b><span>your ${money(floor)} lifestyle floor</span></div>
    </div>

// ---------------------------------------------------------------------
// Internship Intelligence — parses the REAL scraped description text for the
// signals aerospace internship-seekers actually need: export-control/citizenship
// requirements, security clearance, degree-level eligibility, hardware vs.
// software track, and specific technical skill tags. Pure text-derived, so it
// works on any live-scraped row without needing new scraper schema fields.
// ---------------------------------------------------------------------
// Memoized — internshipSignals runs several regexes over the full description text, and is
// called repeatedly per render (once per row, once per sort comparison during Array.sort,
// once per filter check) — without caching that's O(n log n) redundant text parses on every
// list render. Cache by job id (stable across renders of the same underlying row).
const _sigCache=new Map();
function internshipSignals(j){
  const key=j.id;
  if(key && _sigCache.has(key)) return _sigCache.get(key);
  const sig=_computeInternshipSignals(j);
  if(key) _sigCache.set(key,sig);
  return sig;
}
function _computeInternshipSignals(j){
  const text=((j.title||'')+' '+(j.description||'')).toLowerCase();
  // ITAR / export control — the #1 filter aerospace students need. Citizenship-restricted
  // roles are common at defense-adjacent primes; flag it plainly rather than burying it.
  const itar = /\bitar\b|export.control|u\.?s\.?\s*citizen(ship)?\s*(required|only|is required)?|must be a u\.?s\.? citizen|permanent resident.{0,20}(required|status)|export administration regulations|\bear\b\s*(compliance|regulated)/i.test(text);
  // Security clearance
  let clearance=null;
  if(/top secret\s*\/?\s*sci|\btss?ci\b/i.test(text)) clearance='Top Secret/SCI';
  else if(/top secret/i.test(text)) clearance='Top Secret';
  else if(/\bsecret\s+clearance|clearance.{0,15}\bsecret\b|able to obtain.{0,20}clearance/i.test(text)) clearance='Secret';
  else if(/security clearance/i.test(text)) clearance='Clearance required';
  // Degree-level eligibility
  const degrees=[];
  if(/\bph\.?d\.?\b|doctoral/i.test(text)) degrees.push('PhD');
  if(/master'?s? (degree|student|candidate)|\bm\.?s\.?\b\s*(degree|program)|graduate student/i.test(text)) degrees.push("Master's");
  if(/undergrad|bachelor'?s?|\bb\.?s\.?\b\s*(degree|program)|sophomore|junior|senior year/i.test(text)) degrees.push('Undergrad');
  if(/freshman/i.test(text)) degrees.push('Freshman OK');
  // Hardware vs. software — the on-site/cleanroom vs. remote-friendly signal
  const hwHit=/hardware|cleanroom|test stand|flight hardware|hands-?on|build.{0,10}(rocket|satellite|spacecraft)|integration (and|&) test|\bi&t\b|on-?site required/i.test(text);
  const swHit=/software|firmware|embedded|algorithm|simulation|codebase|remote.friendly|hybrid/i.test(text);
  const track = hwHit && !swHit ? 'Hardware' : swHit && !hwHit ? 'Software' : (hwHit&&swHit) ? 'Hardware + Software' : null;
  // Housing / relocation stipend
  const housing = /housing stipend|corporate housing|relocation (assistance|stipend|package)|temporary housing|travel stipend/i.test(text);
  // Skill tags — aerospace-specific stack, distinct from the generic `tech` list
  const SKILLS=['C++','Python','MATLAB','Simulink','ROS','SolidWorks','CAD','FPGA','Verilog','VHDL','LabVIEW','ANSYS','STK','GNC','CATIA','Ada','C#','Java','SQL','Linux','Git'];
  const skillHits=SKILLS.filter(s=>{
    const esc2=s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    return new RegExp('(^|[^a-z0-9])'+esc2.toLowerCase()+'([^a-z0-9]|$)','i').test(text);
  });
  // Real application deadline — parse an actual date out of the description ("Applications
  // close August 15, 2026", "Apply by 08/15/2026", "Priority deadline: 6/1") instead of only
  // estimating from the posting date. Falls back to the 45-day estimate when none is found.
  let deadline=null;
  const MONTHS='january|february|march|april|may|june|july|august|september|october|november|december|jan|feb|mar|apr|jun|jul|aug|sep|sept|oct|nov|dec';
  const dm=text.match(new RegExp('(?:application|apply|priority)?\\s*(?:deadline|closes?|due)[^.\\n]{0,20}?\\b((?:'+MONTHS+')\\.?\\s+\\d{1,2}(?:st|nd|rd|th)?(?:,?\\s*\\d{4})?|\\d{1,2}\\/\\d{1,2}(?:\\/\\d{2,4})?)','i'))
    || text.match(new RegExp('apply\\s+by\\s+((?:'+MONTHS+')\\.?\\s+\\d{1,2}(?:st|nd|rd|th)?(?:,?\\s*\\d{4})?|\\d{1,2}\\/\\d{1,2}(?:\\/\\d{2,4})?)','i'));
  if(dm){
    const raw=dm[1];
    const parsed=new Date(raw.includes('/')||/\d{4}/.test(raw) ? raw : raw+', '+new Date().getFullYear());
    if(!isNaN(parsed) && parsed>new Date(2024,0,1)) deadline={date:parsed, source:'posted'};
  }
  // Program start date — parse "Summer 2026", "starting June 2026", explicit dates like
  // "begins 6/1/2026" — so internships can be sorted/filtered by when the program actually
  // runs, distinct from the application deadline.
  let startDate=null;
  const seasonM=text.match(/\b(summer|fall|autumn|spring|winter)\s+(20\d{2})\b/i);
  if(seasonM){
    const seasonStart={summer:5,fall:8,autumn:8,spring:2,winter:11};
    const mo=seasonStart[seasonM[1].toLowerCase()]; const yr=+seasonM[2];
    if(mo!=null) startDate=new Date(yr,mo,1);
  }
  if(!startDate){
    const sm=text.match(new RegExp('(?:start(?:ing|s)?|begins?)\\s+(?:date\\s*)?(?:on\\s+)?((?:'+MONTHS+')\\.?\\s+\\d{1,2}(?:st|nd|rd|th)?,?\\s*\\d{4}|\\d{1,2}\\/\\d{1,2}\\/\\d{2,4})','i'));
    if(sm){ const d=new Date(sm[1]); if(!isNaN(d) && d>new Date(2024,0,1)) startDate=d; }
  }
  let endDate=null;
  if(startDate && j.internWeeks) endDate=new Date(startDate.getTime()+j.internWeeks*7*86400000);
  return {itar, clearance, degrees, track, housing, skillHits, deadline, startDate, endDate};
}

  const CAPSHEAD=/\b([A-Z][A-Z'&]*(?:\s+[A-Z][A-Z'&()]*){1,7})\s*:?(?=\s|$)/g;
  // ATS postings also commonly use Title-Case intro labels ending in a colon
  // ("About Us:", "Job Summary:", "The Opportunity:") — treat these as headings too,
  // so the intro block doesn't run on as one dense wall of text.
  const SOFTHEAD=/\b(about us|about the company|about the team|company overview|job summary|position summary|role summary|overview|the opportunity|who we are)\s*:/ig;
  let txt=raw;
  // Preserve any real line breaks already in the text (from earlier structured scrapes),
  // and split on real bullet glyphs — never guess bullets from ordinary hyphens/dashes,
  // which appear constantly in normal sentences ("5-7 years", "in-person", asides).
  txt=txt.replace(/\r/g,'').replace(/\n{2,}/g,'\n').replace(/[•▪●‣]/g,'\n• ');
  txt=txt.replace(SOFTHEAD,m=>'\n### '+m.replace(/:$/,'').trim()+'\n');
  txt=txt.replace(HEAD,m=>'\n### '+m.replace(/:$/,'').trim()+'\n');
  txt=txt.replace(CAPSHEAD,(m,words)=>{
    const wc=words.trim().split(/\s+/).length;
    // require a real multi-word ALL-CAPS run (not just an acronym like "FSS" or "NASA")
    return wc>=2 ? '\n### '+words.trim()+'\n' : m;
  });
  const lines=txt.split('\n').map(s=>s.trim()).filter(Boolean);
  let html='', inList=false;
  const closeList=()=>{ if(inList){ html+='</ul>'; inList=false; } };
  for(const ln of lines){
    if(ln.startsWith('### ')){ closeList(); html+=`<h5 style="margin:14px 0 6px;font-size:.82rem;letter-spacing:.04em;color:var(--a3);text-transform:uppercase">${esc(ln.slice(4))}</h5>`; }
    else if(ln.startsWith('• ')){ if(!inList){ html+='<ul style="margin:4px 0 0;padding-left:18px">'; inList=true; } html+=`<li style="margin-bottom:5px">${esc(ln.slice(2))}</li>`; }
    else { closeList(); splitIntoParagraphs(ln).forEach(p=>{ html+=`<p style="margin:0 0 10px;font-size:.86rem;color:#cfdcec;line-height:1.65">${esc(p)}</p>`; }); }
  }
  closeList();
  return `<div class="dblock"><h4>📄 Full Role Description &amp; Responsibilities</h4>
    <div style="max-height:340px;overflow:auto;padding-right:6px">${html}</div></div>`;
}
// Long, un-headed prose (e.g. an "About the company" intro with no internal breaks) reads as
// one dense wall of text. Split it into sentences and regroup into ~3-sentence paragraphs so
// it presents like normal writing instead of a single run-on block.
function splitIntoParagraphs(text){
  if(text.length<260) return [text];
  const sentences=text.match(/[^.!?]+(?:[.!?]+(?=\s|$)|$)/g) || [text];
  const paras=[]; let cur=[];
  sentences.forEach(s=>{
    cur.push(s.trim());
    if(cur.length>=3){ paras.push(cur.join(' ').trim()); cur=[]; }
  });
  if(cur.length) paras.push(cur.join(' ').trim());
  return paras.filter(Boolean);
}

function pdfEscape(s){ return String(s).replace(/\\/g,'\\\\').replace(/\(/g,'\\(').replace(/\)/g,'\\)'); }
function buildResumePDF(lines){
  // lines: [{t:'text', size, bold, gap}] — single Letter page, Helvetica
  const W=612,H=792,L=54; let y=H-64; const ops=[];
  ops.push(`0.02 0.04 0.08 rg 0 0 ${W} ${H} re f`);            // dark bg
  ops.push(`0.216 0.839 0.902 rg 0 ${H-6} ${W} 6 re f`);        // accent bar
  for(const ln of lines){
    const size=ln.size||10.5, bold=ln.bold;
    if(ln.gap) y-=ln.gap;
    if(ln.rule){ ops.push(`0.15 0.21 0.30 RG 0.8 w ${L} ${y+4} m ${W-L} ${y+4} l S`); }
    const col = ln.accent ? '0.216 0.839 0.902' : (ln.dim?'0.55 0.62 0.73':'0.91 0.94 0.98');
    const f = bold?'/F2':'/F1';
    // wrap
    const max=Math.floor((W-L*2)/(size*0.5));
    const words=String(ln.t||'').split(' '); let cur='';
    const flush=t=>{ ops.push(`BT ${f} ${size} Tf ${col} rg 1 0 0 1 ${L} ${y} Tm (${pdfEscape(t)}) Tj ET`); y-=size*1.5; };
    if(!ln.t){ y-=size*1.5; continue; }
    for(const w of words){ if((cur+' '+w).length>max && cur){ flush(cur); cur=w; } else cur=cur?cur+' '+w:w; }
    if(cur) flush(cur);
  }
  const content=ops.join('\n');
  const objs=[];
  objs.push('<< /Type /Catalog /Pages 2 0 R >>');
  objs.push('<< /Type /Pages /Kids [3 0 R] /Count 1 >>');
  objs.push(`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${W} ${H}] /Resources << /Font << /F1 5 0 R /F2 6 0 R >> >> /Contents 4 0 R >>`);
  objs.push(`<< /Length ${content.length} >>\nstream\n${content}\nendstream`);
  objs.push('<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>');
  objs.push('<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold >>');
  let pdf='%PDF-1.4\n'; const off=[];
  objs.forEach((o,i)=>{ off.push(pdf.length); pdf+=`${i+1} 0 obj\n${o}\nendobj\n`; });
  const xref=pdf.length; pdf+=`xref\n0 ${objs.length+1}\n0000000000 65535 f \n`;
  off.forEach(o=>{ pdf+=String(o).padStart(10,'0')+' 00000 n \n'; });
  pdf+=`trailer\n<< /Size ${objs.length+1} /Root 1 0 R >>\nstartxref\n${xref}\n%%EOF`;
  return pdf;
}

    const found=SKILL_LEXICON.filter(s=>low.includes(s.toLowerCase()));
    const m=text.match(/(?:skills|core competencies|areas of expertise)\s*[:\n]([\s\S]{0,500})/i);
    if(m){ m[1].split(/[,•|·\n;]/).map(x=>x.trim()).filter(x=>x.length>2&&x.length<42&&/[a-z]/i.test(x)).slice(0,28).forEach(x=>{ const canon=SKILL_LEXICON.find(s=>s.toLowerCase()===x.toLowerCase()); const v=canon||x.replace(/\b\w/g,c=>c.toUpperCase()); if(!found.some(f=>f.toLowerCase()===v.toLowerCase())) found.push(v); }); }
    if(found.length){
      let prof={}; try{ prof=JSON.parse(localStorage.getItem('orbital.profile')||'{}'); }catch(e){}
      prof.skills=[...new Set([...(prof.skills||[]), ...found])];
      localStorage.setItem('orbital.profile', JSON.stringify(prof));
      localStorage.setItem('orbital.skills', JSON.stringify(prof.skills));
      if(Array.isArray(prof.skills) && prof.skills.length) OWNER.skills=prof.skills;
      clearMatchCache();
      if(msg){ const cur=msg.textContent; msg.style.color='var(--good)'; msg.textContent=cur.replace(/\s*·.*$/,'')+' · '+found.length+' skills detected → matching updated.'; }
    }
  }catch(e){ /* keep the stored PDF even if text extraction fails */ }
}

    }catch(e){}

  }

    if(!data) return {rows:null, reason:reason||'amazon unreachable'};

// Translate a raw Supabase error into a plain-English cause + fix.
function fpDiagnose(m){
  m=(m||'').toLowerCase();
  if(/relation .* does not exist|could not find the table|undefined table/.test(m)) return 'The "jobs" table doesn’t exist yet. Create it first — run the SQL from START-HERE.html (Step 1), then retry.';
  if(/row-level security|violates row-level|permission denied|not authorized|42501/.test(m)) return 'Writes are blocked by Row-Level Security. Use the SERVICE_ROLE key here (not the anon key), or add an INSERT policy on "jobs".';
  if(/invalid api key|jwt|signature|invalid claim|invalidjwt/.test(m)) return 'That service_role key is invalid. Copy it fresh from Supabase → Settings → API → service_role.';
  if(/failed to fetch|networkerror|load failed/.test(m)) return 'Could not reach Supabase. Check the Project URL is exactly https://<ref>.supabase.co and that you are online.';
  if(/column .* does not exist|schema cache|pgrst204|pgrst205/.test(m)) return 'The table is missing a column these rows use. Recreate it from the SQL in START-HERE.html.';
  return null;
}
function fpExtractInternPay(title,desc,isIntern){
  if(!isIntern) return {rate:null,weeks:null};
  const text=(title||'')+' '+(desc||'');
  let rate=null;
  let m=text.match(/\$\s*(\d{2,3}(?:\.\d{1,2})?)\s*(?:-|to|–)\s*\$?\s*(\d{2,3}(?:\.\d{1,2})?)\s*(?:\/|per\s+)hour/i);
  if(m) rate=Math.round((parseFloat(m[1])+parseFloat(m[2]))/2);
  if(rate==null){ m=text.match(/\$\s*(\d{2,3}(?:\.\d{1,2})?)\s*(?:\/|per\s+)\s*hour/i); if(m) rate=Math.round(parseFloat(m[1])); }
  if(rate==null){ m=text.match(/hourly (?:rate|pay|wage)(?:\s+of)?\s*(?:is|:)?\s*\$\s*(\d{2,3}(?:\.\d{1,2})?)/i); if(m) rate=Math.round(parseFloat(m[1])); }
  let weeks=null;
  m=text.match(/(\d{1,2})\s*[-–]\s*(\d{1,2})\s*week/i);
  if(m) weeks=Math.round((parseInt(m[1])+parseInt(m[2]))/2);
  if(weeks==null){ m=text.match(/(\d{1,2})\s*week/i); if(m) weeks=parseInt(m[1]); }
  return {rate,weeks};
}

    logo_bg:'#2a4d7a', source:type, status:'active', saved:false, archived:false, url, description:fpStrip(desc).slice(0,4000), timestamp:posted };
}
const fpSkipCols=new Set();
async function fpUpsert(client,row){
  let r={...row}; for(const c of fpSkipCols) delete r[c];
  for(let t=0;t<12;t++){
    const {error}=await client.from('jobs').upsert(r);
    if(!error) return {ok:true};
    const msg=error.message||String(error);
    const mt=msg.match(/could not find the '([^']+)' column|column "?([a-z0-9_]+)"? of/i);
    const name=mt&&(mt[1]||mt[2]);
    if(name && (name in r)){ fpSkipCols.add(name); delete r[name]; continue; }   // auto-heal old/partial schema
    return {ok:false, error:msg};
  }
  return {ok:false, error:'too many schema mismatches'};
}
async function runFirstPass(){
  const svc=($('#fpSvc')?.value||'').trim(); const msg=$('#fpMsg');
  if(!SB_URL){ if(msg){msg.style.color='var(--bad)';msg.textContent='Connect a Supabase URL first (Save & reconnect above).';} return; }
  if(svc.length<30){ if(msg){msg.style.color='var(--bad)';msg.textContent='Paste your service_role key — writing rows requires it.';} return; }
  const client=window.supabase.createClient(SB_URL,svc);
  const wrap=$('#fpWrap'); if(wrap) wrap.style.display='flex';
  const log=$('#fpLog'); if(log){ log.style.display='block'; log.innerHTML=''; }
  const ring=$('#fpRing'), spin=$('#fpSpin');
  const setP=p=>{ if(ring) ring.style.setProperty('--p',p); const pv=$('#fpPv'); if(pv) pv.textContent=Math.round(p)+'%'; };
  const line=(t,c)=>{ if(!log)return; const d=document.createElement('div'); if(c)d.style.color=c; d.textContent=t; log.appendChild(d); log.scrollTop=log.scrollHeight; };
  setP(0); const cEl=$('#fpCount'); if(cEl) cEl.textContent='0';
  const run=$('#fpRun'); if(run) run.disabled=true;
  if(msg){ msg.style.color='var(--muted)'; msg.textContent='Scanning '+FP_COMPANIES.length+' live boards for real postings…'; }
  fpSkipCols.clear();
  // full refresh: clear stale rows (old demo/seed data) so ONLY real scraped roles remain
  try{ await client.from('jobs').delete().neq('id','__keep_none__'); line('··  cleared previous rows (full refresh)','#7fa8c9'); }catch(e){}
  let total=0, boards=0, blocked=0, writeErr=null;
  for(let i=0;i<FP_COMPANIES.length;i++){
    const [name,slug,type]=FP_COMPANIES[i]; const sub=$('#fpSub'); if(sub) sub.textContent='Checking '+name+'…';
    const {rows,reason}=await fpFetchBoard(name,slug,type);
    if(rows===null){ blocked++; line('··  '+name+' — skipped ('+reason+')','#caa15a'); setP((i+1)/FP_COMPANIES.length*100); continue; }
    if(!rows.length){ line('--  '+name+' — board OK, 0 matching roles'); setP((i+1)/FP_COMPANIES.length*100); continue; }
    boards++; let kept=0;
    for(const it of rows){ const row=fpNormalize(it,type,name,slug); if(!row)continue;
      const w=await fpUpsert(client,row); if(!w.ok){ writeErr=w.error; break; } kept++; total++; if(cEl)cEl.textContent=String(total); }
    line((kept?'++  ':'--  ')+name+' — '+kept+' role(s) synced', kept?'var(--good)':null);
    if(writeErr) break;
    setP((i+1)/FP_COMPANIES.length*100);
  }
  if(writeErr){
    if(spin) spin.style.display='none'; if(run) run.disabled=false;
    const fix=fpDiagnose(writeErr);
    line('!!  WRITE ERROR: '+writeErr,'#ff7a8a'); if(fix) line('    FIX: '+fix,'#caa15a');
    if(msg){ msg.style.color='var(--bad)'; msg.innerHTML='✖ Sync stopped before finishing — nothing more was written.<br><b style="color:var(--text)">Why:</b> '+esc(writeErr)+(fix?'<br><b style="color:var(--text)">Fix this, then run again:</b> '+fix:''); }
    return;
  }
  setP(100); if(spin) spin.style.display='none'; if(ring) ring.style.background='conic-gradient(var(--good) 100%,var(--good) 0)';
  const pv=$('#fpPv'); if(pv){ pv.textContent='100%'; pv.style.color='var(--good)'; }
  const sub=$('#fpSub'); if(sub) sub.textContent=total+' real roles written to Supabase';
  if(run) run.disabled=false;
  if(total>0){
    if(fpSkipCols.size) line('note: table missing column(s) ['+[...fpSkipCols].join(', ')+'] — wrote without them. Recreate the table from START-HERE.html for full features.','#caa15a');
    settings.dataSource='live'; persistSettings();
    await initData();
    await verifyLiveJobs();
    if(msg){ msg.style.color='var(--good)'; msg.textContent='✔ '+total+' real role(s) synced & verified below. Close Settings to browse the live console.'; }
  } else if(msg){
    msg.style.color='var(--bad)';
    msg.innerHTML=blocked+' board(s) were blocked by the browser (this is normal — big boards like Blue Origin block browsers). Those come in through the daily GitHub robot instead. Make sure GitHub is set up (Step 2), then check back.';
  }
}
async function verifyLiveJobs(){
  const out=$('#fpVerify'); if(!out) return;
  if(!SB_URL||!SB_KEY){ out.style.display='block'; out.innerHTML='<span style="color:var(--bad)">Connect Supabase (URL + anon key) first.</span>'; return; }
  out.style.display='block'; out.innerHTML='<span class="subtle">Verifying live data in Supabase…</span>';
  try{
    const c=window.supabase.createClient(SB_URL,SB_KEY);
    const {count,error}=await c.from('jobs').select('*',{count:'exact',head:true}); if(error) throw error;
    const {data}=await c.from('jobs').select('company,title,location,url,location_hub,match').order('posting_age',{ascending:true}).limit(6);
    const {data:all}=await c.from('jobs').select('location_hub');
    const hubs={}; (all||[]).forEach(r=>{hubs[r.location_hub]=(hubs[r.location_hub]||0)+1;});
    const rows=(data||[]).map(j=>`<div style="display:flex;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px solid var(--line)"><span style="min-width:0"><b style="color:var(--text)">${esc(j.title)}</b><br><span class="subtle">${esc(j.company)} · ${esc(j.location||'')} · ${j.match||0}%</span></span><a href="${esc(j.url)}" target="_blank" rel="noreferrer" style="color:var(--a3);white-space:nowrap;font-size:.78rem">real link ↗</a></div>`).join('');
    out.innerHTML=`<div style="color:var(--good);font-weight:600;margin-bottom:5px">✔ ${count??0} live role(s) in Supabase</div>
      <div class="subtle" style="margin-bottom:8px">Seattle ${hubs.SEATTLE||0} · LA ${hubs.GREATER_LA||0} · NZ ${hubs.NEW_ZEALAND||0}</div>
      ${rows||'<span class="subtle">No rows yet — run the first pass above.</span>'}
      ${rows?'<div class="subtle" style="margin-top:8px;font-size:.72rem">Click any “real link” to confirm it opens the actual posting.</div>':''}`;
  }catch(e){ out.innerHTML='<span style="color:var(--bad)">Verify failed: '+esc(e.message||e)+' — confirm the table exists and anon SELECT is allowed.</span>'; }
}

// Mobile swipe-based region switching — swipe left/right anywhere on the content area to
// cycle Global → Seattle → LA → NZ, like flipping between viewports on a console.
let _swipeWired=false;
function wireSwipeRegion(){
  if(_swipeWired) return; _swipeWired=true;
  let sx=0, sy=0, active=false;
  document.addEventListener('touchstart', e=>{
    const t=e.touches[0]; sx=t.clientX; sy=t.clientY; active=true;
  }, {passive:true});
  document.addEventListener('touchend', e=>{
    if(!active) return; active=false;
    const t=e.changedTouches[0]; const dx=t.clientX-sx, dy=t.clientY-sy;
    if(Math.abs(dx)<70 || Math.abs(dx)<Math.abs(dy)*1.8) return;   // must be a clear horizontal swipe
    if(document.getElementById('vault')) return;                   // don't hijack the PIN vault / modals
    if(document.querySelector('.modal')) return;
    const i=REGION_ORDER.indexOf(region);
    const next = dx<0 ? REGION_ORDER[(i+1)%REGION_ORDER.length] : REGION_ORDER[(i-1+REGION_ORDER.length)%REGION_ORDER.length];
    setRegion(next);
  }, {passive:true});
}

let autoScrapeTimer;
function doRefresh(btn){
  const b = btn || $('#manualRefresh');
  if(!b) { initData().then(render); return; }
  if(b.dataset.busy==='1') return;
  b.dataset.busy='1';
  const original = b.innerHTML;
  b.style.position='relative'; b.style.overflow='hidden';
  let pct = 0;
  const paint = (label) => {
    b.style.background = `linear-gradient(90deg, rgba(55,214,230,.32) ${pct}%, rgba(55,214,230,.10) ${pct}%)`;
    b.innerHTML = `<svg viewBox="0 0 24 24" width="15" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin .7s linear infinite"><path d="M21 12a9 9 0 1 1-2.6-6.4"/><path d="M21 4v5h-5"/></svg><span style="font-variant-numeric:tabular-nums">${label||('Syncing '+Math.round(pct)+'%')}</span>`;
  };
  const done = (label, ok) => {
    pct = 100;
    localStorage.setItem('orbital.lastScrape', new Date().toISOString());
    const n = (typeof liveJobs!=='undefined' && Array.isArray(liveJobs)) ? liveJobs.length : null;
    b.style.background = ok===false ? 'rgba(255,122,138,.16)' : 'rgba(57,230,160,.16)';
    const col = ok===false ? '#ff7a8a' : '#39e6a0';
    b.innerHTML = `<svg viewBox="0 0 24 24" width="15" fill="none" stroke="${col}" stroke-width="2.4"><path d="M20 6 9 17l-5-5"/></svg><span style="color:${col}">${label||(n!=null? n+' roles':'Updated')}</span>`;
    render();
    setTimeout(()=>{ const nb=$('#manualRefresh'); if(nb){ nb.style.background='rgba(55,214,230,.1)'; nb.innerHTML=original; nb.dataset.busy=''; } }, 1900);
  };
  paint();
  const svc = localStorage.getItem('orbital.svc');
  // If the service key is stored, RUN the live scrape in real time (real per-company % ).
  // Otherwise just re-pull what's already in Supabase.
  if(svc && SB_URL && window.supabase && typeof FP_COMPANIES!=='undefined'){
    liveScrapeWithProgress(svc, (frac,label)=>{ pct=Math.min(99,Math.round(frac*100)); paint(label?label+' '+pct+'%':null); })
      .then(async (res)=>{ await initData(); done(res.total+' roles'); })
      .catch(async ()=>{ await initData().catch(()=>{}); done('Sync error', false); });
  } else {
    // ease toward 90% while the network call runs, then settle
    const tick=setInterval(()=>{ pct+=Math.max(0.6,(90-pct)*0.08); if(pct>90)pct=90; paint(); },90);
    initData().then(()=>{ clearInterval(tick); done(); }).catch(()=>{ clearInterval(tick); done('Updated'); });
  }
}
// Real browser scrape across the CORS-reachable boards, with a per-company progress callback.
async function liveScrapeWithProgress(svc, onProgress){
  const client = window.supabase.createClient(SB_URL, svc);
  fpSkipCols.clear();
  let total=0, boards=0, done=0, failedCompanies=[];
  const CONCURRENCY=5;   // Improvement #8: parallel batches instead of one-at-a-time, faster first pass
  for(let i=0;i<FP_COMPANIES.length;i+=CONCURRENCY){
    const batch=FP_COMPANIES.slice(i,i+CONCURRENCY);
    await Promise.all(batch.map(async ([name,slug,type])=>{
      let res; try{ res=await fpFetchBoard(name,slug,type); }catch(e){ res={rows:null}; }
      if(res && res.rows && res.rows.length){
        boards++;
        for(const it of res.rows){ const row=fpNormalize(it,type,name,slug); if(!row) continue; const w=await fpUpsert(client,row); if(w.ok) total++; }
      } else { failedCompanies.push(name); }
      done++; onProgress(done/FP_COMPANIES.length, name.split(' ')[0]);
    }));
  }
  // Improvement #7: record scrape health so it's visible in the UI, not buried in a CSV.
  try{
    localStorage.setItem('orbital.scrapeHealth', JSON.stringify({
      when:new Date().toISOString(), total, boards, attempted:FP_COMPANIES.length,
      failedCompanies: failedCompanies.slice(0,25)
    }));
  }catch(e){}
  return {total, boards};
}
// auto-scrape daily at 6:00 AM CST (UTC-6); re-checks each minute
function scheduleAutoScrape(){
  clearInterval(autoScrapeTimer);
  autoScrapeTimer=setInterval(()=>{
    const nowUTC=new Date();
    const cst=new Date(nowUTC.getTime()-6*3600*1000);
    const stamp=cst.toISOString().slice(0,10);
    if(cst.getUTCHours()===6 && cst.getUTCMinutes()===0 && localStorage.getItem('orbital.lastScrapeDay')!==stamp){
      localStorage.setItem('orbital.lastScrapeDay',stamp);
      doRefresh();
    }
  },60000);
}

  function wireResumeUI(ids){
    const rf=$(ids.file), rmsg=$(ids.msg);
    function storeResume(file){
      if(!file){ return; }
      if(file.type!=='application/pdf' && !/\.pdf$/i.test(file.name||'')){ if(rmsg){ rmsg.style.color='var(--bad)'; rmsg.textContent='Please choose a PDF file.'; } return; }
      if(file.size===0){ if(rmsg){ rmsg.style.color='var(--bad)'; rmsg.textContent='That file is empty (0 bytes) — pick a real résumé PDF.'; } return; }
      if(file.size>15*1024*1024){ if(rmsg){ rmsg.style.color='var(--bad)'; rmsg.textContent='That PDF is over 15MB — export a smaller/compressed version and try again.'; } return; }
      if(rmsg){ rmsg.style.color='var(--muted)'; rmsg.textContent='Loading '+file.name+' …'; }
      const reader=new FileReader();
      reader.onerror=()=>{ if(rmsg){ rmsg.style.color='var(--bad)'; rmsg.textContent='Could not read that file — try again.'; } };
      reader.onload=()=>{
        sessionResumePdf=reader.result;
        let persisted=true;
        try{ localStorage.setItem('orbital.resumePdf',reader.result); }
        catch(e){ persisted=false; }
        try{
          localStorage.setItem('orbital.resumeName',file.name);
          const hist=JSON.parse(localStorage.getItem('orbital.resumeHistory')||'[]');
          hist.unshift({name:file.name, when:new Date().toISOString()});
          localStorage.setItem('orbital.resumeHistory',JSON.stringify(hist.slice(0,12)));

        // update BOTH labels (drawer + profile page) in place, whichever exist right now
        document.querySelectorAll('#resumeName,#resumeNameP').forEach(lbl=>lbl.textContent='Current: '+file.name);
        if(rmsg){
          rmsg.style.color = persisted ? 'var(--good)' : 'var(--gold)';

        }
        const ra=$(ids.actions); if(ra) ra.style.display='flex';
        extractSkillsFromPdf(file);
      };
      reader.readAsDataURL(file);
    }
    if(rf) rf.onchange=e=>{ storeResume(e.target.files[0]); e.target.value=''; };
    const rdrop=$(ids.drop);
    if(rdrop){ rdrop.ondragover=e=>{e.preventDefault();rdrop.classList.add('drag');}; rdrop.ondragleave=()=>rdrop.classList.remove('drag'); rdrop.ondrop=e=>{e.preventDefault();rdrop.classList.remove('drag');storeResume(e.dataTransfer.files[0]);}; }

    const rh=$(ids.history); if(rh){ const hist=JSON.parse(localStorage.getItem('orbital.resumeHistory')||'[]'); if(hist.length>1){ rh.innerHTML='<div class="subtle" style="margin-top:10px;font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:var(--a3)">Revision history</div>'+hist.map((h,i)=>`<div style="display:flex;justify-content:space-between;font-size:.76rem;color:var(--muted);padding:5px 0;border-bottom:1px solid rgba(26,37,54,.5)"><span>${i===0?'★ ':''}rev ${hist.length-i} · ${esc(h.name)}</span><span>${new Date(h.when).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span></div>`).join(''); } }
  }
  wireResumeUI({file:'#resumeFile',msg:'#resumeMsg',drop:'#resumeDrop',view:'#resumeView',actions:'#resumeActions',clear:'#resumeClear',history:'#resumeHistory',reopenDrawer:true});
  wireResumeUI({file:'#resumeFileP',msg:'#resumeMsgP',drop:'#resumeDropP',view:'#resumeViewP',actions:'#resumeActionsP',clear:'#resumeClearP',history:'#resumeHistoryP',reopenDrawer:false});
  const liu=$('#linkedinUrl'); if(liu) liu.oninput=()=>{ const v=liu.value.trim(); localStorage.setItem('orbital.linkedinUrl',v); const lm=$('#linkedinMsg'); const ok=v===''||/linkedin\.com\/(in|pub)\//i.test(v); liu.style.borderColor=ok?'var(--line)':'#ff7a8a'; if(lm){ lm.style.color='#39e6a0'; lm.textContent = v? '✔ Saved.' : ''; } };
  // Save & update everything — persists keys, owner, profile, then reconnects + re-renders.

    persistSettings(); clearMatchCache();
    if(msg){ msg.style.color='var(--muted)'; msg.textContent='Saving & reconnecting…'; }
    try{ await initData(); }catch(e){}
    render(); openDrawer();
    const m2=$('#saveAllMsg'); if(m2){ m2.style.color='var(--good)'; m2.textContent='✔ Saved & updated — '+((liveJobs&&liveJobs.length)||0)+' live roles, matching refreshed.'; }
  };
  const f=$('#setFloor'); if(f) f.oninput=e=>{ settings.matchFloor=+e.target.value; persistSettings(); const h=e.target.closest('.dsec').querySelector('h4'); h.textContent='Match Floor — '+settings.matchFloor+'%'; };
  if(f) f.onchange=()=>{ render(); openDrawer(); };
  const sk=$('#saveKeys'); if(sk) sk.onclick=async()=>{

    setTimeout(()=>{ render(); openDrawer(); },700);
  };
}

(function boot(){
  wireTiltParallax();
  wireSwipeRegion();
  // shared read-only role link → force guest, render just that role
  const sm=location.hash.match(/share=([\w-]+)/);
  if(sm){
    role='guest';
    const j=findJob(sm[1]);
    if(j){ document.getElementById('root').innerHTML=sharedRoleView(j); return; }
  }
  // ===== FIRST-RUN INSTALL GATE =====
  // The platform must complete a full install + real scraping cycle before it launches,
  // so the very first job report is accurate live data — never sample. Until that cycle
  // finishes in setup.html (which sets orbital.installComplete), force the install panel.
  // Install gate. If keys are baked into orbital-config.js (hosted build), the site is
  // already "installed" on EVERY device — don't force per-device setup. Otherwise require
  // the one-time install (which sets orbital.installComplete on this browser).
  const cfgInstalled = !!(window.ORBITAL_CONFIG && window.ORBITAL_CONFIG.url && window.ORBITAL_CONFIG.anonKey);
  if(!cfgInstalled && !localStorage.getItem('orbital.installComplete') && !sm){
    location.replace('setup.html');
    return;
  }
  // paint immediately so the console never shows an empty root
  dataMode = (settings.dataSource==='live') ? 'live' : 'sample';
  render();
  showScanOverlay();
  // upgrade to live Supabase data + pick up any Google OAuth session on return
  initData().then(async ()=>{
    await checkSession();
    if(location.hash.match(/share=([\w-]+)/)){ const j=findJob(RegExp.$1); if(j){ document.getElementById('root').innerHTML=sharedRoleView(j); return; } }
    render();
    hideScanOverlay();
    const m=location.hash.match(/job=([\w-]+)/); if(m) setTimeout(()=>openDossier(m[1]),200);
  }).catch(()=>{ hideScanOverlay(); });
})();
