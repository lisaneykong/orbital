<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Orbital CRM · Command Console</title>
<link rel="manifest" href="manifest.json" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<script src="orbital-config.js" onerror="window.ORBITAL_CONFIG=window.ORBITAL_CONFIG||null"></script>
<style>
:root{
  --bg:#04060c; --bg2:#070b14; --panel:#0b1019; --panel2:#0e1420; --panelhi:#121a28;
  --line:#1a2536; --line2:#263448; --text:#eaf1fb; --muted:#8a9ab2; --dim:#5b6a82;
  --a:#5b8cff; --a2:#9d6bff; --a3:#37d6e6; --a4:#ff4d6d; --a4-soft:rgba(255,77,109,.14);
  --gold:#f5c560; --good:#37e0a0; --bad:#ff6f86; --hot:#ff4d6d;
  --r:14px; --r2:20px;
  --sh:0 16px 44px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.04);
}
*{box-sizing:border-box}
html{font-size:18px}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter Tight','Segoe UI',system-ui,sans-serif;font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden}
h1,h2,h3,h4{font-family:'Space Grotesk',sans-serif;font-weight:600;margin:0;letter-spacing:-.01em}
.mono{font-family:'JetBrains Mono',monospace}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#1e2a3c;border-radius:8px;border:2px solid var(--bg)}
::-webkit-scrollbar-track{background:transparent}
button{font:inherit;cursor:pointer}
a{color:inherit;text-decoration:none}

/* ============ APP SHELL ============ */
.app{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
/* ---- sidebar ---- */
.side{position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:4px;
  background:linear-gradient(180deg,#080c15,#05080f);border-right:1px solid var(--line);padding:18px 14px;overflow-y:auto;z-index:40}
.logo{display:flex;align-items:center;gap:11px;padding:6px 8px 16px}
.logo .mark{width:34px;height:34px;border-radius:50%;position:relative;flex:none;
  background:radial-gradient(circle at 35% 30%,#2a4d7a,#0a1322);border:1px solid var(--line2);box-shadow:0 0 18px rgba(91,140,255,.4),inset 0 0 12px rgba(91,140,255,.3)}
.logo .mark:after{content:'';position:absolute;inset:7px;border-radius:50%;border:1.5px solid rgba(120,180,255,.7);transform:rotate(-25deg) scaleY(.4)}
.logo .mark:before{content:'';position:absolute;left:50%;top:50%;width:7px;height:7px;margin:-3.5px;border-radius:50%;background:#7db4ff;box-shadow:0 0 10px #7db4ff}
.logo .wm{font-family:'Space Grotesk';font-weight:700;font-size:1.16rem;letter-spacing:.3px}
.logo .wm b{color:var(--a3)}
.logohome{display:flex;align-items:center;gap:11px;cursor:pointer;border-radius:10px;padding:2px 4px;transition:.15s}
.logohome:hover{background:rgba(255,255,255,.04)}
.orbmark{width:32px;height:32px;flex:none;filter:drop-shadow(0 0 8px rgba(95,140,255,.55))}
.mtopbar .mwm,.sharedbar .logohome{cursor:pointer}
.nav{display:flex;flex-direction:column;gap:2px;flex:1}
.nav .lbl{font-size:.64rem;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);padding:14px 12px 6px}
.nav a{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:11px;color:var(--muted);font-weight:500;font-size:.9rem;transition:.14s;position:relative}
.nav a svg{width:17px;height:17px;flex:none;stroke-width:1.8}
.nav a:hover{color:var(--text);background:rgba(255,255,255,.03)}
.nav a.active{color:#fff;background:linear-gradient(90deg,rgba(91,140,255,.16),rgba(91,140,255,.04));border:1px solid rgba(91,140,255,.25)}
.nav a.active:before{content:'';position:absolute;left:-14px;top:50%;transform:translateY(-50%);width:3px;height:18px;border-radius:0 3px 3px 0;background:var(--a3)}
.nav a .badge{margin-left:auto;font-size:.66rem;font-weight:700;background:var(--a3);color:#04121a;padding:2px 7px;border-radius:999px}
.nav a .badge.alt{background:var(--a2);color:#fff}
.side .card{margin-top:auto;border:1px solid var(--line);border-radius:var(--r);padding:11px 12px;background:rgba(255,255,255,.02)}
.regionpick{display:flex;align-items:center;gap:10px;cursor:pointer}
.regionpick .flag{font-size:1.1rem}
.regionpick .rn{font-weight:600;font-size:.9rem}
.regionpick .rs{font-size:.72rem;color:var(--muted)}
.regionpick .cv{margin-left:auto;color:var(--dim)}
.usercard{display:flex;align-items:center;gap:10px;margin-top:8px}
.usercard img{width:34px;height:34px;border-radius:50%;object-fit:cover;border:1px solid var(--line2)}
.usercard .un{font-weight:600;font-size:.86rem}
.usercard .ur{font-size:.72rem;color:var(--muted)}

/* ---- main ---- */
.main{min-width:0;display:flex;flex-direction:column}
/* hero */
.hero{position:relative;min-height:290px;overflow:hidden;border-bottom:1px solid var(--line)}
.hero .bg{position:absolute;inset:0;background-size:cover;background-position:center;transform:scale(1.04);filter:saturate(1.35) contrast(1.18) brightness(1.06)}
/* animated sci-fi hero FX */
.herofx{position:absolute;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.herofx .hstars,.herofx .hstars2{position:absolute;inset:0;background-image:radial-gradient(1.4px 1.4px at 12% 30%,#fff,transparent),radial-gradient(1.2px 1.2px at 28% 70%,#cfe6ff,transparent),radial-gradient(1.6px 1.6px at 47% 22%,#fff,transparent),radial-gradient(1.1px 1.1px at 63% 58%,#bcd4ff,transparent),radial-gradient(1.5px 1.5px at 78% 35%,#fff,transparent),radial-gradient(1.2px 1.2px at 88% 72%,#e6f0ff,transparent),radial-gradient(1px 1px at 38% 85%,#fff,transparent);opacity:.6;animation:twinkle 4s ease-in-out infinite}
.herofx .hstars2{background-size:cover;opacity:.4;animation:twinkle 6s ease-in-out infinite reverse, drift 60s linear infinite;background-image:radial-gradient(1px 1px at 20% 50%,#fff,transparent),radial-gradient(1px 1px at 55% 15%,#def,transparent),radial-gradient(1.2px 1.2px at 75% 80%,#fff,transparent),radial-gradient(1px 1px at 92% 40%,#cef,transparent),radial-gradient(1px 1px at 8% 65%,#fff,transparent)}
@keyframes twinkle{0%,100%{opacity:.3}50%{opacity:.8}}
@keyframes drift{0%{transform:translateX(0)}100%{transform:translateX(-40px)}}
.herofx .haurora{position:absolute;left:-20%;top:-50%;width:140%;height:150%;background:conic-gradient(from 0deg,transparent,color-mix(in srgb,var(--a3) 30%,transparent),transparent 30%,color-mix(in srgb,var(--a2) 26%,transparent),transparent 60%);filter:blur(46px);opacity:.45;animation:aurora 18s ease-in-out infinite}
@keyframes aurora{0%,100%{transform:translateX(-6%) translateY(0) scale(1) rotate(0deg)}50%{transform:translateX(8%) translateY(6%) scale(1.15) rotate(8deg)}}
.herofx .hnebula{position:absolute;right:-10%;top:-30%;width:60%;height:120%;background:radial-gradient(closest-side,color-mix(in srgb,var(--a2) 34%,transparent),transparent 70%);filter:blur(54px);opacity:.4;animation:nebula 22s ease-in-out infinite}
@keyframes nebula{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-8%,8%) scale(1.2)}}
.herofx .hgrid{position:absolute;inset:0;background-image:linear-gradient(color-mix(in srgb,var(--a3) 12%,transparent) 1px,transparent 1px),linear-gradient(90deg,color-mix(in srgb,var(--a3) 12%,transparent) 1px,transparent 1px);background-size:46px 46px;-webkit-mask-image:radial-gradient(ellipse 70% 60% at 70% 30%,#000,transparent 75%);mask-image:radial-gradient(ellipse 70% 60% at 70% 30%,#000,transparent 75%);opacity:.35;animation:gridpulse 7s ease-in-out infinite}
@keyframes gridpulse{0%,100%{opacity:.18}50%{opacity:.4}}
.herofx .hbeam{position:absolute;right:8%;top:-20%;width:2px;height:140%;background:linear-gradient(180deg,transparent,color-mix(in srgb,var(--a3) 50%,transparent),transparent);box-shadow:0 0 30px 6px color-mix(in srgb,var(--a3) 30%,transparent);transform:rotate(14deg);animation:beamsweep 9s ease-in-out infinite}
@keyframes beamsweep{0%,100%{transform:rotate(14deg) translateX(0);opacity:.3}50%{transform:rotate(10deg) translateX(-120px);opacity:.7}}
.herofx .hscan{position:absolute;inset:0;background:linear-gradient(90deg,transparent,color-mix(in srgb,var(--a3) 16%,transparent),transparent);width:34%;animation:scan 8s linear infinite}
@keyframes scan{0%{transform:translateX(-120%)}100%{transform:translateX(360%)}}
/* comet with glowing tail */
.herofx .comet{position:absolute;top:-8%;left:-8%;width:5px;height:5px;border-radius:50%;background:#fff;box-shadow:0 0 14px 4px color-mix(in srgb,var(--a3) 80%,#fff);animation:cometfly 9s ease-in infinite}
.herofx .comet:before{content:'';position:absolute;right:4px;top:50%;width:180px;height:2px;transform:translateY(-50%) rotate(0deg);transform-origin:right center;background:linear-gradient(90deg,transparent,color-mix(in srgb,var(--a3) 85%,#fff))}
@keyframes cometfly{0%{transform:translate(0,0) rotate(32deg);opacity:0}8%{opacity:1}55%{opacity:1}70%{opacity:0}100%{transform:translate(118vw,72vh) rotate(32deg);opacity:0}}
/* shooting stars */
.herofx .shoot{position:absolute;width:2px;height:2px;border-radius:50%;background:#fff;box-shadow:0 0 8px 2px #cfe6ff;opacity:0}
.herofx .shoot:before{content:'';position:absolute;right:2px;top:50%;width:90px;height:1.5px;transform:translateY(-50%);background:linear-gradient(90deg,transparent,#cfe6ff)}
.herofx .shoot.s1{top:18%;left:30%;animation:shoot 7s linear infinite 1s}
.herofx .shoot.s2{top:40%;left:60%;animation:shoot 9s linear infinite 4s}
.herofx .shoot.s3{top:12%;left:80%;animation:shoot 11s linear infinite 7s}
@keyframes shoot{0%{transform:translate(0,0) rotate(28deg);opacity:0}5%{opacity:1}22%{opacity:1}30%{opacity:0}100%{transform:translate(-340px,180px) rotate(28deg);opacity:0}}
.herofx .streak{position:absolute;top:22%;left:-14%;width:64px;height:64px;filter:drop-shadow(0 0 14px color-mix(in srgb,var(--a3) 75%,transparent));animation:streakfly 16s linear infinite}
.herofx .streak2{top:60%;width:52px;height:52px;animation:streakfly 22s linear infinite;animation-delay:6s}
.herofx .streak .sat{display:block;width:100%;height:100%;animation:satspin 6s linear infinite;transform-origin:50% 50%}
.herofx .streak .rkt{display:block;width:100%;height:100%;animation:rktwobble 2.4s ease-in-out infinite}
@keyframes satspin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes rktwobble{0%,100%{transform:rotate(38deg)}50%{transform:rotate(34deg)}}
.herofx .streak:before{content:'';position:absolute;right:100%;top:50%;width:180px;height:2px;transform:translateY(-50%);background:linear-gradient(90deg,transparent,color-mix(in srgb,var(--a3) 75%,transparent))}
@keyframes streakfly{0%{transform:translate(0,0)}100%{transform:translate(140vw,-70px)}}
@media (prefers-reduced-motion:reduce){.herofx .streak,.herofx .haurora,.herofx .hscan,.herofx .hstars{animation:none}.herofx .streak{display:none}}
.hero .ov{position:absolute;inset:0}
.hero .inner{position:relative;z-index:2;padding:26px 30px;display:flex;justify-content:space-between;gap:20px;min-height:208px;align-items:flex-start}
.hero .eyebrow{font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--a3);font-weight:600;margin-bottom:8px}
.hero h1{font-size:2.5rem;line-height:1.05;letter-spacing:-.02em;padding-left:2px;overflow:visible;text-shadow:0 2px 22px rgba(2,4,10,.85),0 1px 4px rgba(2,4,10,.7)}
.hero h1 .g{background:linear-gradient(90deg,var(--a3),var(--a));-webkit-background-clip:text;background-clip:text;color:transparent;padding-right:4px}
.hero .sub{margin-top:10px;color:#cfdbed;font-size:1rem;max-width:56ch;text-shadow:0 1px 12px rgba(0,0,0,.5)}
.hero .greet{font-size:2.1rem;font-family:'Orbitron',sans-serif;font-weight:700;letter-spacing:.01em}
/* glassy mission-console HUD (replaces flat planet) */
.hero .inner{align-items:center}
.hero-lead{flex:1;min-width:0}
.herohud{flex:none;width:320px;display:flex;gap:16px;align-items:center;padding:18px;border-radius:18px;
  border:1px solid rgba(120,180,255,.22);background:linear-gradient(160deg,rgba(20,32,52,.55),rgba(8,12,22,.4));
  backdrop-filter:blur(16px);box-shadow:0 20px 60px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.08),0 0 40px color-mix(in srgb,var(--a3) 14%,transparent);position:relative;overflow:hidden}
.herohud:before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,color-mix(in srgb,var(--a3) 10%,transparent),transparent);transform:translateX(-100%);animation:hudsheen 6s ease-in-out infinite}
@keyframes hudsheen{0%{transform:translateX(-100%)}55%,100%{transform:translateX(220%)}}
.hud-ring{position:relative;width:104px;height:104px;flex:none}
.hud-ring svg{width:104px;height:104px;transform:rotate(-90deg)}
.hud-ring .hr-bg,.hud-ring .hr-bg2{fill:none;stroke:rgba(120,160,235,.16);stroke-width:5}
.hud-ring .hr-fg{fill:none;stroke:var(--a3);stroke-width:5;stroke-linecap:round;stroke-dasharray:327;stroke-dashoffset:80;filter:drop-shadow(0 0 6px var(--a3));animation:hrpulse 4s ease-in-out infinite}
.hud-ring .hr-fg2{fill:none;stroke:var(--a);stroke-width:4;stroke-linecap:round;stroke-dasharray:239;stroke-dashoffset:150;opacity:.8;animation:hrpulse 5s ease-in-out infinite reverse}
@keyframes hrpulse{0%,100%{stroke-dashoffset:90}50%{stroke-dashoffset:55}}
.hud-core{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.hud-core b{font-family:'Space Grotesk';font-size:1.7rem;font-weight:700;color:#fff;line-height:1;text-shadow:0 0 14px color-mix(in srgb,var(--a3) 60%,transparent)}
.hud-core span{font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--a3);margin-top:3px}
.hud-sweep{position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 0deg,color-mix(in srgb,var(--a3) 45%,transparent),transparent 22%);-webkit-mask-image:radial-gradient(circle,transparent 30px,#000 31px,#000 50px,transparent 51px);mask-image:radial-gradient(circle,transparent 30px,#000 31px,#000 50px,transparent 51px);animation:radarspin 4s linear infinite;opacity:.7}
@keyframes radarspin{to{transform:rotate(360deg)}}
.hud-readouts{flex:1;min-width:0;display:flex;flex-direction:column;gap:7px}
.hud-row{display:flex;justify-content:space-between;align-items:center;font-size:.72rem;border-bottom:1px solid rgba(120,160,235,.12);padding-bottom:5px}
.hud-row .hk{color:var(--muted);letter-spacing:.08em;font-weight:600}
.hud-row .hv{font-family:'JetBrains Mono';font-weight:700;color:#eaf1fb}
.hud-row .hv.hot{color:var(--hot)} .hud-row .hv.ok{color:var(--good)} .hud-row .hv.amber{color:var(--gold)}
.hud-wave{display:flex;align-items:flex-end;gap:3px;height:22px;margin-top:2px}
.hud-wave i{flex:1;background:linear-gradient(180deg,var(--a3),var(--a));border-radius:2px;animation:wave 1.3s ease-in-out infinite}
.hud-wave i:nth-child(odd){animation-duration:1.6s}.hud-wave i:nth-child(3n){animation-duration:1.1s}
@keyframes wave{0%,100%{height:20%}50%{height:100%}}
@media(max-width:920px){.herohud{display:none}}
.hero .wx{display:flex;flex-direction:column;gap:8px;align-items:flex-end}
.wxcard{display:flex;align-items:center;gap:12px;padding:11px 15px;border-radius:var(--r);border:1px solid rgba(255,255,255,.14);
  background:rgba(8,12,20,.5);backdrop-filter:blur(10px)}
.wxcard .loc{display:flex;align-items:center;gap:7px;font-weight:600;font-size:.9rem}
.wxcard .tp{font-family:'JetBrains Mono';font-size:1.5rem;font-weight:600}
.wxcard .cond{font-size:.74rem;color:var(--muted)}
.hero .clock{font-size:.78rem;color:#aebaccc;color:#9fb0c9;text-align:right}

/* topbar (global title hero variant uses different) */
.contentpad{padding:18px 26px 60px;display:flex;flex-direction:column;gap:calc(16px * var(--density,1))}
/* Tweaks: Density reshapes spacing + type; Energy adds glow/motion */
.contentpad .panel .pb{padding:calc(14px * var(--density,1)) calc(18px * var(--density,1)) calc(18px * var(--density,1))}
.contentpad .stats{gap:calc(12px * var(--density,1))}
.contentpad .stack,.contentpad .dashgrid,.contentpad .col-main,.contentpad .col-rail{gap:calc(16px * var(--density,1))}
.panel .ph h3{font-size:calc(.96rem * var(--fscale,1))}
.stat .v{font-size:calc(1.7rem * var(--fscale,1))}
.hero h1{font-size:calc(2.5rem * var(--fscale,1))}
.energy-charged .panel{box-shadow:0 16px 44px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.04), 0 0 0 1px color-mix(in srgb,var(--a3) 8%,transparent)}
.energy-charged .stat:hover,.energy-charged .jrow:hover{box-shadow:0 0 24px color-mix(in srgb,var(--a3) 22%,transparent)}
.energy-charged .logo .mark,.energy-charged .dot{animation-duration:1.6s !important}
.energy-charged .hero .bg{filter:saturate(1.5) contrast(1.22) brightness(1.08)}
.energy-calm *{animation-duration:6s !important}
.energy-calm .hero .bg{filter:saturate(1.2) contrast(1.1)}
/* ============ READABLE MODE — astigmatism / low-vision accessibility ============ */
.readable-mode .panel:before{display:none !important}   /* kill the moving nebula wash behind text */
.readable-mode .gen-nebula{opacity:.25 !important}
.hero .gen-nebula{opacity:1 !important}   /* intensity maxed \u2014 full generative-art wash over the real regional skyline */
.readable-mode{--muted:#b7c4d8; --dim:#8b9db8}          /* higher-contrast secondary text */
.readable-mode .jrow{border-bottom:2px solid rgba(120,160,235,.32) !important; border-radius:6px}
.readable-mode .panel{border-width:2px !important}
.readable-mode .jtitle{font-size:1.02rem !important;font-weight:700 !important;line-height:1.4 !important}
.readable-mode .jco{font-size:.92rem !important;font-weight:500 !important}
.readable-mode .jsalary,.readable-mode .chip{letter-spacing:.03em !important;font-weight:700 !important}
.readable-mode p,.readable-mode .subtle,.readable-mode .dblock p{font-size:1rem !important;line-height:1.7 !important}
.readable-mode .stat .v{font-weight:800 !important}
.readable-mode .ticker{display:none}   /* remove the scrolling motion strip */
/* tweak panel chrome */
.tweakrow .si b{font-size:.86rem;font-weight:600;display:block}
.tweakrow .si span{font-size:.74rem;color:var(--muted)}
.tweakseg{flex-wrap:wrap}
.seg3 button[data-tw]{flex:1 1 auto;min-width:0}

/* filter bar */
.filters{display:flex;gap:10px;flex-wrap:wrap;align-items:center;padding:12px;border:1px solid var(--line);border-radius:var(--r2);
  background:linear-gradient(180deg,var(--panel),var(--bg2));box-shadow:var(--sh);position:sticky;top:8px;z-index:30}
.fsearch{flex:1;min-width:190px;display:flex;align-items:center;gap:9px;padding:0 13px;border:1px solid var(--line);border-radius:11px;background:rgba(5,8,13,.6)}
.fsearch svg{width:16px;height:16px;color:var(--dim)}
.fsearch input{flex:1;background:transparent;border:0;outline:none;color:var(--text);font:inherit;padding:11px 0}
.fsel{position:relative}
.fsel label{display:block;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);position:absolute;top:6px;left:13px;pointer-events:none}
.fsel select{appearance:none;font:inherit;font-weight:600;font-size:.82rem;color:var(--text);background:rgba(5,8,13,.6);border:1px solid var(--line);border-radius:11px;padding:19px 32px 7px 13px;outline:none;cursor:pointer}
.fsel:after{content:'▾';position:absolute;right:12px;top:50%;transform:translateY(-30%);color:var(--dim);pointer-events:none;font-size:.7rem}
.toggle2{display:flex;padding:3px;border:1px solid var(--line);border-radius:11px;background:rgba(5,8,13,.6)}
.toggle2 button{border:0;background:transparent;color:var(--muted);font-weight:600;font-size:.82rem;padding:8px 14px;border-radius:8px}
.toggle2 button.on{color:#04121a;background:var(--a3)}
.toggle2 button.on.intern{background:var(--gold);color:#1a1303}
.fbtn{display:flex;align-items:center;gap:7px;font-weight:600;font-size:.84rem;color:var(--text);border:1px solid var(--line2);background:rgba(255,255,255,.03);border-radius:11px;padding:10px 14px}
.fbtn svg{width:15px;height:15px}
.fbtn:hover{border-color:var(--a)}

/* stat cards */
.stats{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px}
.stat{position:relative;padding:16px;border:1px solid var(--line);border-radius:var(--r);background:linear-gradient(180deg,var(--panel2),var(--bg2));overflow:hidden}
.stat .ic{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;margin-bottom:12px}
.stat .ic svg{width:18px;height:18px}
.stat .v{font-family:'Orbitron',sans-serif;font-weight:700;font-size:1.55rem;line-height:1;letter-spacing:.01em}
.ticker{overflow:hidden;white-space:nowrap;border-bottom:1px solid var(--line);background:linear-gradient(90deg,rgba(55,214,230,.06),rgba(157,107,255,.04));padding:7px 0;position:relative}
.ticker:before,.ticker:after{content:'';position:absolute;top:0;bottom:0;width:36px;z-index:1;pointer-events:none}
.ticker:before{left:0;background:linear-gradient(90deg,var(--bg),transparent)}
.ticker:after{right:0;background:linear-gradient(-90deg,var(--bg),transparent)}
.tick-track{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--muted);letter-spacing:.03em;animation:tickscroll 32s linear infinite;padding-left:100%}
.tick-item{padding:0 6px}
.tick-sep{color:var(--a3);opacity:.5}
@keyframes tickscroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@media (prefers-reduced-motion: reduce){.tick-track{animation:none;padding-left:12px}}
.stat .l{font-size:.72rem;color:var(--muted);margin-top:5px}
.stat .d{font-size:.72rem;font-weight:600;margin-top:8px;display:flex;align-items:center;gap:4px}
.stat .d.up{color:var(--good)} .stat .d.down{color:var(--bad)}

/* grid layout */
.cols{display:grid;gap:16px}
.cols.c75{grid-template-columns:1fr 360px}
.cols.c3{grid-template-columns:repeat(3,1fr)}
.cols.c2{grid-template-columns:1fr 1fr}
.colstack{display:flex;flex-direction:column;gap:16px;min-width:0}

.panel{border:1px solid var(--line);border-radius:var(--r2);background:linear-gradient(180deg,var(--panel),var(--bg2));box-shadow:var(--sh);overflow:hidden}
.panel .ph{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:15px 18px 0}
.panel .ph h3{font-size:.96rem;display:flex;align-items:center;gap:8px}
.panel .ph h3 .fire{color:var(--hot)}
.panel .ph .va{font-size:.78rem;color:var(--a3);font-weight:600}
.panel .pb{padding:14px 18px 18px}
.subtle{color:var(--muted);font-size:.8rem}
.chart-box{position:relative;height:250px}
.chart-box.sm{height:210px}
.chart-box canvas{position:absolute;inset:0}

/* rotating featured-internship banner (real data only) */
.featbanner{position:relative;height:118px;margin:6px 0 14px;border-radius:16px;overflow:hidden;border:1px solid rgba(55,214,230,.28);background:linear-gradient(120deg,rgba(55,214,230,.1),rgba(0,230,162,.06))}
.featstack{position:relative;height:100%}
.featslide{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;gap:5px;padding:16px 22px;width:100%;text-align:left;background:none;border:0;cursor:pointer;opacity:0;animation:featcycle calc(var(--n)*5s) infinite}
@keyframes featcycle{
  0%{opacity:0} 2%{opacity:1} 16%{opacity:1} 20%{opacity:0} 100%{opacity:0}
}
.featbadge{font-size:.66rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--a3)}
.feattitle{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.15rem;color:#fff}
.featco{font-size:.86rem;color:var(--muted)}
.featmeta{display:flex;flex-wrap:wrap;gap:14px;font-size:.82rem;margin-top:2px}
.featdots{position:absolute;bottom:10px;right:16px;display:flex;gap:6px}
.featdot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.25);animation:featdotcycle calc(var(--n)*5s) infinite}
@keyframes featdotcycle{
  0%{background:rgba(255,255,255,.25)} 2%{background:var(--a3)} 16%{background:var(--a3)} 20%{background:rgba(255,255,255,.25)} 100%{background:rgba(255,255,255,.25)}
}

/* job list (inline pipeline) */
.joblist{display:flex;flex-direction:column}
.jrow{position:relative;display:flex;align-items:center;gap:13px;padding:13px 10px;border-bottom:1px solid rgba(26,37,54,.6);border-left:3px solid transparent;transition:.14s;cursor:pointer;border-radius:8px;
  clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px))}
.jrow:before,.jrow:after{content:'';position:absolute;width:16px;height:16px;border:0 solid var(--a3);opacity:0;transition:opacity .18s,transform .18s;pointer-events:none}
.jrow:before{top:2px;right:2px;border-top-width:2px;border-right-width:2px;transform:translate(-4px,4px)}
.jrow:after{bottom:2px;left:2px;border-bottom-width:2px;border-left-width:2px;transform:translate(4px,-4px)}
.jrow:hover{background:linear-gradient(90deg,rgba(255,77,109,.06),rgba(157,107,255,.05) 55%,rgba(55,214,230,.05));border-left-color:var(--a3);box-shadow:inset 0 0 0 1px rgba(55,214,230,.14),0 0 22px rgba(157,107,255,.10)}
.jrow:hover:before,.jrow:hover:after{opacity:1;transform:translate(0,0)}
.jrow.hotjob{border-left-color:var(--hot)}
.jlogo{width:42px;height:42px;border-radius:11px;flex:none;display:grid;place-items:center;font-family:'Space Grotesk';font-weight:700;font-size:1rem;color:#fff}
.jmain{flex:1;min-width:0}
.jtitle{font-weight:600;font-size:.94rem;display:flex;align-items:center;gap:8px}
.jtitle .hot{font-size:.6rem;font-weight:700;letter-spacing:.05em;color:#fff;background:var(--a4);padding:2px 6px;border-radius:5px;box-shadow:0 0 10px var(--a4-soft)}
.jtitle .postedage{font-size:.66rem;font-weight:600;color:var(--dim);margin-left:auto;padding-left:8px}
.jco{font-size:.8rem;color:var(--muted);margin-top:2px}
.jco b{color:var(--a3);font-weight:600}
.jmeta{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap}
.chip{font-size:.66rem;font-weight:600;color:var(--muted);border:1px solid var(--line2);border-radius:6px;padding:3px 7px}
.chip.reloc{color:var(--a3);border-color:rgba(55,214,230,.3);background:rgba(55,214,230,.07)}
.srcbadge{font-size:.62rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--sc,#8a9ab2);border:1px solid color-mix(in srgb,var(--sc,#8a9ab2) 45%,transparent);background:color-mix(in srgb,var(--sc,#8a9ab2) 12%,transparent);padding:3px 7px;border-radius:6px}
.chip.intern{color:var(--gold);border-color:rgba(245,197,96,.35)}
.rtag{font-size:.62rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--rt,#9d6bff);border:1px solid color-mix(in srgb,var(--rt,#9d6bff) 45%,transparent);background:color-mix(in srgb,var(--rt,#9d6bff) 12%,transparent);padding:3px 7px;border-radius:6px;cursor:default}
.jsalary{font-family:'JetBrains Mono';font-weight:600;font-size:.92rem;color:var(--good);white-space:nowrap}
.jright{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.planets{display:flex;gap:2px;align-items:center}
.planets .pl{font-size:.95rem;line-height:1}
.jactions{display:flex;gap:6px}
.minibtn{font-size:.68rem;font-weight:600;color:var(--muted);border:1px solid var(--line2);background:rgba(255,255,255,.02);border-radius:7px;padding:5px 8px;display:flex;align-items:center;gap:4px}
.minibtn:hover{color:var(--text);border-color:var(--a)}
.minibtn svg{width:12px;height:12px}

/* horizontal bars */
.hbars{display:flex;flex-direction:column;gap:11px}
.hbar{display:grid;grid-template-columns:128px 1fr auto;gap:10px;align-items:center;font-size:.82rem}
.hbar .nm{color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hbar .tk{height:9px;border-radius:6px;background:rgba(255,255,255,.05);overflow:hidden}
.hbar .tk i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--a3),var(--a))}
.hbar .ct{font-family:'JetBrains Mono';font-weight:600;color:var(--muted);font-size:.78rem}
.hbar.clickbar{cursor:pointer;border-radius:7px;padding:3px;margin:-3px;transition:background .12s}
.hbar.clickbar:hover{background:rgba(91,140,255,.08)}
.va.clearco{cursor:pointer;color:var(--gold)}

/* skills chips */
.chips{display:flex;flex-wrap:wrap;gap:8px}
.skchip{font-size:.78rem;font-weight:500;color:#cfe3ff;border:1px solid var(--line2);background:rgba(91,140,255,.07);border-radius:9px;padding:7px 11px}

/* planet rank guide */
.prank{display:flex;flex-direction:column;gap:11px}
.prow{display:flex;align-items:flex-start;gap:11px}
.prow .pp{flex:none;font-size:.86rem;width:64px;display:flex;gap:1px}
.prow .pt b{font-size:.82rem}
.prow .pt span{display:block;font-size:.74rem;color:var(--muted)}

/* relocation dossier */
.reloc-hero{height:120px;background-size:cover;background-position:center;position:relative}
.reloc-hero .nm{position:absolute;left:14px;bottom:10px;z-index:2}
.reloc-hero .nm b{font-family:'Space Grotesk';font-size:1.2rem;font-weight:700;display:block}
.reloc-hero .nm span{font-size:.76rem;color:var(--a3)}
.reloc-hero .ov{position:absolute;inset:0;background:linear-gradient(180deg,transparent,rgba(8,12,20,.92))}
.relsec{padding:14px 16px;border-top:1px solid var(--line)}
.relsec h4{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--a3);margin-bottom:9px;display:flex;align-items:center;gap:7px}
.relsec p{color:#c3d1e6;font-size:.83rem;line-height:1.55;margin:0}
.relrow{display:flex;justify-content:space-between;gap:10px;font-size:.82rem;padding:5px 0;border-bottom:1px solid rgba(26,37,54,.5)}
.relrow:last-child{border-bottom:0}
.relrow .k{color:var(--muted)}
.relrow .v{font-family:'JetBrains Mono';font-weight:600}
.relrow .v.good{color:var(--good)} .relrow .v.bad{color:var(--bad)}
.relrow .vsnash{color:var(--dim);font-weight:500;font-family:'Inter Tight',sans-serif;font-size:.72rem}
.bullets{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:7px}
.bullets li{position:relative;padding-left:16px;font-size:.82rem;color:#c3d1e6}
.bullets li:before{content:'';position:absolute;left:0;top:7px;width:6px;height:6px;border-radius:50%;background:var(--a3)}
.housing{display:flex;gap:10px;margin-bottom:10px}
.housing img{width:64px;height:50px;object-fit:cover;border-radius:9px;border:1px solid var(--line2);flex:none}
.housing .hi{flex:1;min-width:0}
.housing .hi b{font-size:.82rem}
.housing .hi span{display:block;font-size:.74rem;color:var(--muted)}
.housing .hi .pr{color:var(--good);font-family:'JetBrains Mono';font-weight:600;font-size:.8rem}
.zillow{font-size:.76rem;color:var(--a3);font-weight:600}
.linkbtns{display:flex;gap:8px;flex-wrap:wrap}
.linkbtns a{font-size:.74rem;font-weight:600;color:var(--text);border:1px solid var(--line2);border-radius:8px;padding:7px 10px;display:flex;align-items:center;gap:5px}
.linkbtns a:hover{border-color:var(--a3);color:var(--a3)}

/* budget sandbox */
.budget .pb{display:flex;flex-direction:column;gap:14px}
.slider label{display:flex;justify-content:space-between;font-size:.8rem;font-weight:600;margin-bottom:7px}
.slider label b{font-family:'JetBrains Mono';color:var(--a3)}
.slider input[type=range]{width:100%;accent-color:var(--a3)}
.checks{display:flex;flex-direction:column;gap:9px}
.chk{display:flex;align-items:center;gap:10px;font-size:.82rem;color:#c3d1e6;cursor:pointer}
.chk input{width:17px;height:17px;accent-color:var(--a3)}
.chk .amt{margin-left:auto;font-family:'JetBrains Mono';font-size:.76rem;color:var(--muted)}
.gross{margin-top:4px;text-align:center;padding:16px;border-radius:var(--r);border:1px solid rgba(55,214,230,.3);background:radial-gradient(120px 80px at 50% 0,rgba(55,214,230,.12),transparent)}
.gross .lab{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.gross .val{font-family:'Space Grotesk';font-size:2rem;font-weight:700;color:var(--good);margin-top:4px}
.gross .sub{font-size:.74rem;color:var(--muted);margin-top:4px}

/* region cards (global) */
.regcard{padding:16px}
.regcard .rh{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.regcard .globe{width:54px;height:54px;border-radius:50%;flex:none;background-size:cover;position:relative;box-shadow:0 0 18px rgba(91,140,255,.3)}
.regcard .medal{position:absolute;top:-4px;left:-4px;font-size:1.1rem}
.regcard .rt b{font-family:'Space Grotesk';font-size:1.05rem;font-weight:700}
.regcard .rt .va{font-size:.72rem;color:var(--a3);font-weight:600}
.regcard .hl{font-size:.7rem;color:var(--muted);margin:10px 0 6px;letter-spacing:.05em}
.regcard .pr{display:flex;align-items:center;gap:4px;margin-bottom:12px}
.regcard .pr .sc{margin-left:6px;font-family:'JetBrains Mono';font-weight:600;color:var(--text)}

/* candidate dossier (global) */
.cand .ch{position:relative;text-align:center;padding:22px 18px 14px}
.cand .ring{width:96px;height:96px;border-radius:50%;margin:0 auto;padding:3px;background:conic-gradient(var(--a3),var(--a),var(--a2),var(--a3))}
.cand .ring img{width:100%;height:100%;border-radius:50%;object-fit:cover;border:3px solid var(--panel)}
.cand .cn{font-size:1.2rem;margin-top:11px;display:flex;align-items:center;justify-content:center;gap:6px}
.cand .cn .vf{color:var(--a3)}
.cand .ct{color:var(--muted);font-size:.85rem;margin-top:2px}
.cand .cmeta{font-size:.78rem;color:var(--muted);margin-top:8px;display:flex;flex-direction:column;gap:4px;align-items:center}
.cand .open{display:inline-flex;align-items:center;gap:6px;margin-top:10px;font-size:.76rem;font-weight:600;color:var(--good);border:1px solid rgba(55,224,160,.3);border-radius:999px;padding:5px 12px}
.cand .quad{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.cand .quad div{background:var(--panel);padding:13px 6px;text-align:center}
.cand .quad b{font-family:'Space Grotesk';font-size:1.15rem;display:block}
.cand .quad span{font-size:.66rem;color:var(--muted)}
.cand .cs{padding:14px 18px;border-bottom:1px solid var(--line)}
.cand .cs h4{font-size:.82rem;margin-bottom:10px;display:flex;justify-content:space-between}
.cand .cs h4 .va{font-size:.72rem;color:var(--a3)}
.acts{display:flex;flex-direction:column;gap:11px}
.act{display:flex;gap:11px;align-items:flex-start;font-size:.8rem}
.act .ai{width:30px;height:30px;border-radius:9px;flex:none;display:grid;place-items:center;background:rgba(91,140,255,.1);color:var(--a3)}
.act .at b{font-weight:600} .act .at span{display:block;color:var(--muted);font-size:.74rem}

/* sidebar data-source status card */
.datastatus .dsrow{display:flex;align-items:center;gap:10px}
.datastatus .dsdot{width:9px;height:9px;border-radius:50%;flex:none}
.datastatus.sample{border-color:rgba(245,197,96,.4)}
.datastatus.sample .dsdot{background:var(--gold);box-shadow:0 0 9px var(--gold)}
.datastatus.live{border-color:rgba(55,224,160,.4)}
.datastatus.live .dsdot{background:var(--good);box-shadow:0 0 9px var(--good)}
.datastatus .dsname{font-weight:600;font-size:.84rem}
.datastatus.sample .dsname{color:var(--gold)} .datastatus.live .dsname{color:var(--good)}
.datastatus .dssub{font-size:.7rem;color:var(--muted)}
.datastatus:hover{background:rgba(255,255,255,.04)}
.app.nav-collapsed .side .datastatus{display:none}

/* ============ SETTINGS DRAWER ============ */
.fab{position:fixed;right:20px;bottom:20px;z-index:60;width:54px;height:54px;border-radius:50%;border:1px solid var(--line2);
  background:linear-gradient(180deg,#16223a,#0b1322);box-shadow:0 12px 30px rgba(0,0,0,.5);display:grid;place-items:center;transition:.2s}
.fab:hover{transform:rotate(45deg) scale(1.05);border-color:var(--a3)}
.fab svg{width:24px;height:24px;color:var(--a3)}
.drawer-bg{position:fixed;inset:0;z-index:70;background:rgba(2,4,8,.72);backdrop-filter:blur(6px);display:none}
.drawer-bg.open{display:block}
.drawer{position:fixed;top:0;right:-460px;height:100%;width:min(420px,100%);z-index:71;
  background:linear-gradient(180deg,#0c1320,#070b12);border-left:1px solid var(--line2);box-shadow:-30px 0 80px rgba(0,0,0,.6);overflow-y:auto}
.drawer.open{right:0 !important;animation:slideInR .28s cubic-bezier(.4,0,.2,1)}
@keyframes slideInR{from{right:-460px}to{right:0}}
.drawer .dh{position:sticky;top:0;background:rgba(12,19,32,.96);backdrop-filter:blur(8px);padding:20px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;z-index:2}
.drawer .dh h2{font-size:1.15rem;display:flex;align-items:center;gap:9px}
.drawer .db{padding:20px 22px 60px;display:flex;flex-direction:column;gap:22px}
.dsec h4{font-size:.7rem;letter-spacing:.13em;text-transform:uppercase;color:var(--a3);margin-bottom:12px}
.field{margin-bottom:12px}
.field label{display:block;font-size:.76rem;color:var(--muted);margin-bottom:6px}
.field input{width:100%;font-family:'JetBrains Mono';font-size:.82rem;color:var(--text);background:rgba(5,8,13,.7);border:1px solid var(--line2);border-radius:10px;padding:11px 12px;outline:none}
.field input:focus{border-color:var(--a3)}
.swrow{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid rgba(26,37,54,.6)}
.swrow:last-child{border-bottom:0}
.swrow .si b{font-size:.86rem;font-weight:600;display:block}
.swrow .si span{font-size:.74rem;color:var(--muted)}
.sw{width:44px;height:25px;border-radius:999px;background:#202c3e;position:relative;border:1px solid var(--line2);flex:none;transition:.18s;cursor:pointer}
.sw:after{content:'';position:absolute;top:2px;left:2px;width:19px;height:19px;border-radius:50%;background:#7e8ca5;transition:.18s}
.sw.on{background:rgba(55,214,230,.3);border-color:var(--a3)}
.sw.on:after{left:21px;background:var(--a3)}
.seg3{display:flex;gap:4px;padding:4px;border:1px solid var(--line2);border-radius:11px;background:rgba(5,8,13,.6)}
.seg3 button{flex:1;border:0;background:transparent;color:var(--muted);font-weight:600;font-size:.8rem;padding:9px;border-radius:8px}
.seg3 button.on{color:#04121a;background:var(--a3)}
.dbtn{width:100%;font-weight:600;border-radius:11px;padding:13px;border:1px solid var(--line2);background:rgba(255,255,255,.03);color:var(--text)}
.dbtn.primary{background:linear-gradient(180deg,rgba(55,214,230,.25),rgba(55,214,230,.07));border-color:rgba(55,214,230,.4);color:#cdf6fb}
.dbtn:hover{border-color:var(--a3)}
.savemsg{font-size:.78rem;text-align:center;color:var(--good);min-height:16px}
.upload{display:flex;align-items:center;gap:11px;border:1px dashed var(--line2);border-radius:12px;padding:14px;cursor:pointer;transition:.14s;background:rgba(5,8,13,.4)}
.upload:hover,.upload.drag{border-color:var(--a3);background:rgba(55,214,230,.06)}
.upload .upic{font-size:1.4rem}
.upload .uptext{font-size:.84rem;color:#cfdcec}

/* ============ MODAL (dossier / share) ============ */
.modal-bg{position:fixed;inset:0;z-index:80;background:rgba(2,4,8,.78);backdrop-filter:blur(7px);display:none;align-items:center;justify-content:center;padding:24px}
.modal-bg.open{display:flex}
.modal{width:min(880px,100%);max-height:90vh;overflow-y:auto;border:1px solid var(--line2);border-radius:var(--r2);
  background:linear-gradient(180deg,#0c1320,#070b12);box-shadow:0 40px 100px rgba(0,0,0,.7);position:relative;
  clip-path:polygon(0 18px,18px 0,100% 0,100% calc(100% - 18px),calc(100% - 18px) 100%,0 100%)}
.modal:before,.modal:after{content:'';position:absolute;width:26px;height:26px;border:0 solid var(--a3);pointer-events:none;z-index:2}
.modal:before{top:8px;left:8px;border-top-width:2px;border-left-width:2px;opacity:.7}
.modal:after{bottom:8px;right:8px;border-bottom-width:2px;border-right-width:2px;opacity:.7}
.modal.share{width:min(440px,100%)}
.modal .mx{position:absolute;top:16px;right:18px;z-index:5;width:34px;height:34px;border-radius:9px;display:grid;place-items:center;
  color:var(--muted);border:1px solid var(--line2);background:rgba(8,12,20,.7);font-size:1.1rem}
.modal .mx:hover{color:#fff;border-color:var(--bad)}
.dossier-top{position:relative;padding:22px 24px;border-bottom:1px solid var(--line);background:linear-gradient(140deg,rgba(255,77,109,.10),rgba(157,107,255,.08) 45%,transparent);overflow:hidden}
.dossier-top>*{position:relative;z-index:1}
.dossier-top .dt-flag{font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;color:var(--a3);font-weight:700}
.dossier-top h2{font-size:1.5rem;margin:8px 0 6px;display:flex;align-items:center;gap:10px}
.dossier-top .dco{color:var(--muted)}
.dossier-top .dco b{color:var(--a3)}
.dtagrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;align-items:center}
.dsal{font-family:'JetBrains Mono';font-weight:700;font-size:1.05rem;color:var(--good)}
.dbody{padding:20px 24px;display:flex;flex-direction:column;gap:18px}

.reloperks{display:flex;flex-direction:column;gap:9px}

.techtags{display:flex;flex-wrap:wrap;gap:7px}

.outreach{display:flex;gap:8px;flex-wrap:wrap}
.outreach button{font-size:.78rem;font-weight:600;color:var(--text);border:1px solid var(--line2);background:rgba(255,255,255,.03);border-radius:9px;padding:9px 13px;display:flex;align-items:center;gap:6px}
.outreach button:hover{border-color:var(--a3);color:var(--a3)}
.dactions{display:flex;gap:10px;flex-wrap:wrap;padding:18px 24px;border-top:1px solid var(--line);position:sticky;bottom:0;background:rgba(12,19,32,.96);backdrop-filter:blur(8px)}
.dactions a,.dactions button{font-weight:600;font-size:.86rem;border-radius:11px;padding:12px 18px;border:1px solid var(--line2);background:rgba(255,255,255,.03);color:var(--text);display:flex;align-items:center;gap:8px}
.dactions .apply{flex:1;justify-content:center;background:linear-gradient(180deg,var(--a),var(--a2));border:0;color:#fff}
.dactions .apply:hover{filter:brightness(1.08)}
.dactions button:hover{border-color:var(--a3)}
/* share modal */
.sharecard{padding:24px}
.sharecard .stag{font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;color:var(--a3);font-weight:700}
.sharecard h3{font-size:1.3rem;margin:8px 0 4px}

.sharecard .sgrid{display:flex;flex-direction:column;gap:10px;margin:16px 0}
.sharecard .sr{display:flex;justify-content:space-between;font-size:.86rem;padding:8px 0;border-bottom:1px solid rgba(26,37,54,.6)}

.copyrow{display:flex;gap:8px;margin-top:14px}
.copyrow input{flex:1;font-family:'JetBrains Mono';font-size:.74rem;background:rgba(5,8,13,.7);border:1px solid var(--line2);border-radius:9px;padding:10px;color:var(--muted)}
.copyrow button{font-weight:600;font-size:.8rem;border-radius:9px;padding:10px 14px;border:0;background:var(--a3);color:#04121a}
.sharenote{font-size:.74rem;color:var(--dim);margin-top:12px;text-align:center}
/* shared read-only role page */
.sharedpage{min-height:100vh;padding:30px 18px 60px;background:radial-gradient(900px 500px at 80% -10%,rgba(55,214,230,.10),transparent 60%),var(--bg)}
.sharedwrap{max-width:760px;margin:0 auto}
.sharedbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}

.robadge{font-size:.74rem;font-weight:700;color:var(--gold);border:1px solid rgba(245,197,96,.4);background:rgba(245,197,96,.08);border-radius:999px;padding:6px 13px}
/* inline filter + search bar above listings */
.listbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:12px 16px;border-bottom:1px solid var(--line)}
.listbar h3{font-size:.96rem;margin-right:auto;display:flex;align-items:center;gap:8px}
.listbar .lsel{position:relative}
.listbar select{appearance:none;font:inherit;font-weight:600;font-size:.78rem;color:var(--text);background:rgba(5,8,13,.6);border:1px solid var(--line);border-radius:9px;padding:8px 26px 8px 11px;outline:none;cursor:pointer}
.listbar .lsel:after{content:'▾';position:absolute;right:9px;top:50%;transform:translateY(-40%);color:var(--dim);font-size:.65rem;pointer-events:none}
.listbar .lsearch{display:flex;align-items:center;gap:7px;padding:0 11px;border:1px solid var(--line);border-radius:9px;background:rgba(5,8,13,.6);min-width:150px}

.listbar .lclear{font-size:.78rem;font-weight:600;color:var(--muted);border:1px solid var(--line2);background:transparent;border-radius:9px;padding:8px 11px}

.listcount{font-size:.72rem;color:var(--dim);padding:8px 16px 0}
.seemore{display:flex;justify-content:center;padding:14px 0 4px}
.seemorebtn{display:inline-flex;flex-direction:column;align-items:center;gap:2px;font-weight:700;font-size:.86rem;color:#cdf6fb;
  border:1px solid rgba(55,214,230,.4);background:linear-gradient(180deg,rgba(55,214,230,.18),rgba(55,214,230,.05));border-radius:12px;padding:11px 28px;transition:.15s}
.seemorebtn span{font-size:.66rem;font-weight:500;color:var(--muted)}
.seemorebtn:hover{border-color:var(--a3);background:rgba(55,214,230,.14)}

.pagebtn{min-width:34px;height:34px;padding:0 10px;border-radius:9px;border:1px solid var(--line2);background:rgba(255,255,255,.02);color:var(--muted);font-size:.82rem;font-weight:600;cursor:pointer;transition:.12s}

.pagebtn.on{border-color:var(--a3);color:#04121a;background:var(--a3)}
.pagebtn:disabled{opacity:.35;cursor:default}
/* market momentum blurb */
.momentum-blurb{margin:12px 2px 0;font-size:.84rem;line-height:1.6;color:#c3d1e6;border-left:3px solid var(--a3);padding:2px 0 2px 12px}
/* skills vs my rank */
.srow{display:grid;grid-template-columns:48px 200px 1fr 64px 150px;gap:12px;align-items:center;padding:9px 0;border-bottom:1px solid rgba(26,37,54,.55);font-size:.84rem}
.srow.shead{font-size:.66rem;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);border-bottom:1px solid var(--line2)}
.srow .srank{font-family:'JetBrains Mono';color:var(--dim);font-weight:600}
.srow .sname{font-weight:600;color:var(--text)}
.srow .stk{height:9px;border-radius:6px;background:rgba(255,255,255,.05);overflow:hidden}
.srow .stk i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--a3),var(--a))}
.srow .sdem{font-family:'JetBrains Mono';font-size:.76rem;color:var(--muted);text-align:right}
.srow .syou{font-size:.78rem;font-weight:600}
.srow .syou.have{color:var(--good)} .srow .syou.gap{color:var(--gold)}
@media(max-width:720px){.srow{grid-template-columns:34px 1fr 96px;gap:8px}.srow .stk,.srow .sdem{display:none}}
/* strategy view */
.playgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.playcard{border:1px solid var(--line2);border-radius:13px;padding:15px;background:rgba(5,8,13,.4)}
.playcard .pic{font-size:1.5rem;margin-bottom:8px}
.playcard b{display:block;font-family:'Space Grotesk';font-size:.95rem;margin-bottom:5px}
.playcard span{font-size:.8rem;color:var(--muted);line-height:1.5}
.phaseline{display:flex;flex-direction:column;gap:0}
.phase{display:flex;gap:14px;padding:0 0 18px;position:relative}
.phase:not(:last-child):before{content:'';position:absolute;left:17px;top:34px;bottom:-2px;width:2px;background:var(--line2)}
.phase.done:not(:last-child):before{background:var(--good)}
.phase .pnum{width:36px;height:36px;border-radius:50%;flex:none;display:grid;place-items:center;font-family:'JetBrains Mono';font-weight:700;font-size:.8rem;border:1px solid var(--line2);background:rgba(5,8,13,.5);color:var(--muted);z-index:1}
.phase.done .pnum{background:rgba(55,224,160,.15);border-color:var(--good);color:var(--good)}
.phase .pbody b{display:block;font-size:.95rem}
.phase .pbody span{font-size:.82rem;color:var(--muted);line-height:1.5}
.wkrow{display:grid;grid-template-columns:200px 1fr 56px;gap:12px;align-items:center;padding:8px 0;font-size:.84rem}
.wkrow .wkn{color:var(--text);font-weight:500}
.wkrow .wktk{height:9px;border-radius:6px;background:rgba(255,255,255,.05);overflow:hidden}
.wkrow .wktk i{display:block;height:100%;border-radius:6px}
.wkrow .wkc{font-family:'JetBrains Mono';font-size:.78rem;color:var(--muted);text-align:right}
@media(max-width:720px){.playgrid{grid-template-columns:1fr}.wkrow{grid-template-columns:1fr 80px 48px}}
/* outreach view */
.dockrow{display:flex;align-items:stretch;gap:8px;flex-wrap:wrap}
.dockcard{flex:1;min-width:150px;border:1px solid var(--line2);border-left:3px solid var(--dc,var(--a3));border-radius:12px;padding:14px;background:rgba(5,8,13,.4);position:relative}
.dockcard .dn{position:absolute;top:10px;right:12px;font-family:'JetBrains Mono';font-weight:700;color:var(--dc);opacity:.6}
.dockcard .di{font-size:1.5rem;margin-bottom:6px}
.dockcard b{display:block;font-size:.92rem;margin-bottom:4px}
.dockcard span{font-size:.78rem;color:var(--muted);line-height:1.45}
.dockarrow{display:flex;align-items:center;color:var(--dim);font-size:1.2rem}
.painbox{width:100%;min-height:230px;font-family:'JetBrains Mono',monospace;font-size:.8rem;line-height:1.6;color:#c8d6ea;background:#06090f;border:1px solid var(--line2);border-radius:12px;padding:14px;resize:vertical}
/* event radar */
.eventlist{display:flex;flex-direction:column;gap:10px}
.eventrow{display:flex;gap:14px;align-items:center;border:1px solid var(--line2);border-radius:13px;padding:13px 15px;background:rgba(5,8,13,.4)}
.eventrow .ecount{flex:none;width:60px;text-align:center;border-right:1px solid var(--line2);padding-right:12px}
.eventrow .ecount b{font-family:'Space Grotesk';font-size:1.5rem;font-weight:700;color:var(--a3);display:block;line-height:1}
.eventrow .ecount span{font-size:.64rem;letter-spacing:.1em;text-transform:uppercase;color:var(--dim)}
.eventrow .et{font-weight:600;font-size:.94rem}
.eventrow .etag{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--a3);border:1px solid color-mix(in srgb,var(--a3) 40%,transparent);background:color-mix(in srgb,var(--a3) 12%,transparent);padding:2px 6px;border-radius:5px;margin-left:6px}
.eventrow .eloc{font-size:.78rem;color:var(--muted);margin-top:4px}
.eventrow .ewhy{font-size:.78rem;color:#c3d1e6;margin-top:4px}
@media(max-width:720px){.dockarrow{display:none}}
.chartfoot{margin:10px 2px 0;font-size:.74rem;line-height:1.5;color:var(--muted)}
.chartfoot:before{content:'';display:inline-block;width:16px;height:0;border-top:2px dashed #f5c560;vertical-align:middle;margin-right:7px}
/* city culture & happenings collage */
.culture{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.cbox{position:relative;min-height:158px;border-radius:14px;overflow:hidden;border:1px solid var(--line2);display:flex;align-items:flex-end}
.cbox .cbg{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform .4s}
.cbox:hover .cbg{transform:scale(1.05)}
.cbox .cbody{position:relative;z-index:2;padding:14px 14px 13px}
.cbox .ckind{display:inline-block;font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#fff;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.25);padding:3px 8px;border-radius:999px;margin-bottom:8px}
.cbox .ctitle{display:block;font-family:'Space Grotesk';font-weight:700;font-size:1.05rem;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.6);line-height:1.15}
.cbox .csub{display:block;font-size:.76rem;color:#e7eefb;margin-top:5px;line-height:1.4;text-shadow:0 1px 8px rgba(0,0,0,.7)}
.cbox .cmore{display:inline-block;margin-top:8px;font-size:.72rem;font-weight:700;color:#fff;opacity:.85;text-shadow:0 1px 8px rgba(0,0,0,.7)}
.cbox:hover .cmore{opacity:1}
.cbox:hover{transform:translateY(-2px);transition:transform .14s}
@media (max-width:560px){.culture{grid-template-columns:1fr}}

/* ===== empty / loading ===== */
.empty{display:flex;flex-direction:column;align-items:center;text-align:center;gap:12px;padding:46px 26px;color:var(--muted)}
.empty .big{font-family:'Space Grotesk';font-size:1.2rem;color:var(--text);font-weight:600}
.empty code{font-family:'JetBrains Mono';font-size:.82rem;background:rgba(5,8,13,.7);border:1px solid var(--line2);padding:4px 9px;border-radius:7px;color:var(--a3)}

/* ===== mobile ===== */
.mtopbar{display:none}
.scrim{display:none}
@media (max-width:1180px){
  .stats{grid-template-columns:repeat(3,1fr)}
  .cols.c75{grid-template-columns:1fr}
  .cols.c3{grid-template-columns:1fr}
  .cols.c2{grid-template-columns:1fr}
}
@media (max-width:860px){
  .app,.app.nav-collapsed{grid-template-columns:1fr !important}
  /* Bottom horizontal nav bar instead of the vertical sidebar, and force everything
     below it into one single readable column. */
  .side{position:fixed;left:0;right:0;bottom:0;top:auto;width:100%;height:calc(64px + env(safe-area-inset-bottom));z-index:90;
    flex-direction:row;align-items:stretch;gap:0;padding:0 0 env(safe-area-inset-bottom);border-right:0;
    border-top:1px solid var(--line);overflow-x:auto;overflow-y:hidden;box-shadow:0 -8px 28px rgba(0,0,0,.45);
    background:linear-gradient(180deg,rgba(8,12,21,.88),rgba(4,6,12,.97));backdrop-filter:blur(16px) saturate(1.3)}
  .side .logo,.side .logohome{display:none}
  .side .nav{flex-direction:row;flex:1;gap:0;align-items:stretch;justify-content:space-around}
  .side .nav .lbl{display:none}
  .side .nav a{flex-direction:column;justify-content:center;gap:3px;padding:7px 8px 6px;border-radius:0;flex:1;min-width:52px;
    color:var(--dim);transition:color .18s,transform .18s;position:relative}
  .side .nav a span{display:block !important;font-size:.56rem;letter-spacing:0;text-transform:none;white-space:nowrap;font-weight:500}
  .side .nav a svg{width:20px;height:20px;transition:transform .18s}
  .side .nav a.active{color:var(--a3)}
  .side .nav a.active svg{filter:drop-shadow(0 0 7px color-mix(in srgb,var(--a3) 65%,transparent));transform:translateY(-1px)}
  .side .nav a.active:before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:22px;height:2.5px;
    border-radius:0 0 3px 3px;background:var(--a3);box-shadow:0 0 8px var(--a3)}
  .side .nav a:active{transform:scale(.92)}
  .main{padding-bottom:calc(70px + env(safe-area-inset-bottom))}   /* clear the fixed bottom nav */
  .app,.app.nav-collapsed{grid-template-columns:1fr !important}
  .side .logo .orbitallogo span{display:none}
  .mtopbar{display:none}
  .locbar{display:flex;flex-wrap:wrap;gap:8px;padding:8px 10px}
  .hero .inner{flex-direction:column;padding:20px}
  .hero h1{font-size:1.9rem} .hero .greet{font-size:1.6rem}
  .hero .wx{align-items:flex-start;flex-direction:row;flex-wrap:wrap}
  .contentpad{padding:14px}
  .stats{grid-template-columns:repeat(2,1fr)}
  .filters{position:static}
  .fab{bottom:84px}
  .modal-bg{padding:0;align-items:flex-end}
  .modal{max-height:94vh;border-radius:18px 18px 0 0}
  .dgrid2{grid-template-columns:1fr}
  /* Force every remaining multi-column layout to a single column on mobile. */
  .dashgrid,.cols,.cols.c2,.cols.c75,.playgrid,.kanban,.culture,.stats{grid-template-columns:1fr !important}
  .dashgrid .col-rail{position:static}
}
@media (max-width:480px){
  .stats{grid-template-columns:1fr 1fr}
  .hero h1{font-size:1.6rem}
}
/* ===== MOBILE — hero HUD was a fixed 320px box crammed next to the greeting,
   overflowing/crushing everything on a phone-width screen. Stack it below instead. ===== */
@media (max-width:760px){
  .hero{min-height:0;max-height:240px}
  .hero .inner{flex-direction:column;align-items:stretch;padding:16px 16px;gap:10px;min-height:0}
  .hero .inner{align-items:stretch}
  .herohud{width:100%;box-sizing:border-box}
  .hero-lead{width:100%}
  .hero h1{font-size:1.5rem}
  .hero .greet{font-size:1.4rem}
  .hero .sub{font-size:.9rem}
  .hero-lead .clock{font-size:.78rem}
  .locbar{flex-wrap:wrap;gap:8px;padding:10px 12px}
  .locbar .live{width:100%;justify-content:flex-start;order:3}
  .contentpad{padding:14px !important}
  .dossier .dt-flag,.dossier h2{font-size:1.05rem}
  #modal,.modal{width:94vw !important;max-width:94vw !important;padding:16px !important}
  .dgrid2{grid-template-columns:1fr}
  .jrow{padding:11px 8px;gap:9px}
  .tick-track{font-size:.68rem}
  /* Job listings are the priority on mobile — promote them above the secondary
     widgets (charts, culture, news) instead of making people scroll past everything
     else first. De-emphasize the secondary stuff: smaller charts, tighter rail cards. */
  .contentpad{display:flex;flex-direction:column}
  .contentpad > .dashgrid{order:3}
  .contentpad > .fullwidth#rolesAnchor{order:1}
  .contentpad > .stats{order:0}
  .dashgrid .col-main .chart-wrap,.dashgrid canvas{max-height:180px}
  .dashgrid .col-rail .panel .pb{padding:10px 12px 12px}
  .dashgrid .col-rail .panel .ph h3{font-size:.82rem}
  .culture{grid-template-columns:1fr !important}
  .cbox img{height:64px !important}
  .newsrow{padding:9px 2px}
  .newsrow .nthumb{width:64px;height:48px}
  .newsrow .ntitle{font-size:.82rem}
}

/* =====================================================================
   ✦ SPACE CONSOLE LAYER  (v3 — glassy, radar, collapsible, single-stack)
   ===================================================================== */
/* deep-space backdrop + drifting stars + radar grid */
.spacebg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;
  background:
    radial-gradient(1200px 700px at 82% -8%, rgba(60,110,230,.16), transparent 60%),
    radial-gradient(900px 600px at 8% 4%, rgba(157,107,255,.13), transparent 58%),
    radial-gradient(700px 500px at 50% 108%, rgba(55,214,230,.10), transparent 60%),
    #04060c}
.spacebg .stars,.spacebg .stars2{position:absolute;inset:-50%;background-repeat:repeat;opacity:.9}
.spacebg .stars{background-image:
   radial-gradient(1.4px 1.4px at 20% 30%, #fff, transparent),
   radial-gradient(1.2px 1.2px at 70% 12%, #cfe3ff, transparent),
   radial-gradient(1px 1px at 40% 70%, #fff, transparent),
   radial-gradient(1.3px 1.3px at 88% 56%, #bcd6ff, transparent),
   radial-gradient(1px 1px at 55% 44%, #fff, transparent),
   radial-gradient(1.5px 1.5px at 12% 84%, #e7f0ff, transparent),
   radial-gradient(1px 1px at 33% 18%, #fff, transparent),
   radial-gradient(1.2px 1.2px at 92% 86%, #fff, transparent);
   background-size:520px 520px;animation:drift 240s linear infinite}
.spacebg .stars2{background-image:
   radial-gradient(1px 1px at 15% 60%, rgba(255,255,255,.7), transparent),
   radial-gradient(1px 1px at 65% 35%, rgba(190,214,255,.7), transparent),
   radial-gradient(1px 1px at 80% 75%, rgba(255,255,255,.6), transparent),
   radial-gradient(1px 1px at 45% 90%, rgba(255,255,255,.6), transparent);
   background-size:340px 340px;animation:drift 160s linear infinite reverse;opacity:.6}
@keyframes drift{to{transform:translate3d(-260px,-260px,0)}}
.spacebg .grid{position:absolute;inset:0;opacity:.5;
  background-image:linear-gradient(rgba(91,140,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(91,140,255,.05) 1px,transparent 1px);
  background-size:48px 48px;-webkit-mask-image:radial-gradient(circle at 50% 0,#000,transparent 80%);mask-image:radial-gradient(circle at 50% 0,#000,transparent 80%)}
.app{position:relative;z-index:1}

/* glass panels */
.panel{position:relative;background:linear-gradient(180deg,rgba(17,26,42,.74),rgba(8,12,20,.6));backdrop-filter:blur(16px) saturate(1.25);-webkit-backdrop-filter:blur(16px) saturate(1.25);
  border:1px solid rgba(120,160,235,.15);box-shadow:0 18px 48px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.06);overflow:hidden}
.panel:before{content:'';position:absolute;inset:-40%;z-index:0;pointer-events:none;opacity:.5;mix-blend-mode:screen;
  background:radial-gradient(circle at 18% 12%,rgba(255,77,109,.16),transparent 42%),
             radial-gradient(circle at 82% 88%,rgba(157,107,255,.14),transparent 46%),
             radial-gradient(circle at 60% 30%,rgba(55,214,230,.10),transparent 50%);
  animation:panelnebula 26s ease-in-out infinite}
.panel>*{position:relative;z-index:1}
@keyframes panelnebula{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-3%,3%) scale(1.08)}}
.panel .ph h3{letter-spacing:.2px}
.side{background:linear-gradient(180deg,rgba(8,12,21,.92),rgba(5,8,15,.88));backdrop-filter:blur(12px)}

/* sidebar collapse */
.app.nav-collapsed{grid-template-columns:74px 1fr !important}
.sidetoggle{margin-left:auto;width:30px;height:30px;border-radius:9px;border:1px solid var(--line2);background:rgba(255,255,255,.03);color:var(--muted);display:grid;place-items:center;flex:none;transition:.15s}
.sidetoggle:hover{color:var(--a3);border-color:var(--a3)}
.sidetoggle svg{width:16px;height:16px}
.app.nav-collapsed .logo{justify-content:center;padding:6px 0 16px}
.app.nav-collapsed .logo .wm,.app.nav-collapsed .sidetoggle{display:none}
.app.nav-collapsed .nav a{justify-content:center;padding:9px 0}
.app.nav-collapsed .nav a span,.app.nav-collapsed .nav a .badge,.app.nav-collapsed .nav .lbl{display:none}
.app.nav-collapsed .nav a{position:relative}
.app.nav-collapsed .nav a:hover:after{content:attr(data-label);position:absolute;left:64px;top:50%;transform:translateY(-50%);white-space:nowrap;
  background:#0c1320;border:1px solid var(--line2);padding:6px 10px;border-radius:8px;font-size:.78rem;color:var(--text);z-index:60;box-shadow:0 8px 20px rgba(0,0,0,.5)}
.app.nav-collapsed .side .card{display:none}
.app.nav-collapsed .side .mini-region{display:flex}
.side .mini-region{display:none;margin-top:auto;justify-content:center;font-size:1.2rem;padding:10px 0;cursor:pointer;border:1px solid var(--line);border-radius:11px;background:rgba(255,255,255,.02)}

/* top location bar (side-by-side region toggles) */
.locbar{position:sticky;top:0;z-index:35;display:flex;align-items:center;gap:12px;padding:10px 26px;flex-wrap:nowrap;
  background:rgba(7,11,19,.82);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.locseg{display:flex;gap:5px;padding:5px;border:1px solid var(--line2);border-radius:13px;background:rgba(4,7,13,.6);box-shadow:inset 0 0 18px rgba(55,214,230,.06);flex-wrap:wrap}
.locseg button{position:relative;display:flex;align-items:center;gap:7px;border:1px solid transparent;background:transparent;color:var(--muted);font-weight:600;font-size:.86rem;padding:8px 16px;transition:.18s;white-space:nowrap;clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);letter-spacing:.02em}
.locseg button .fl{font-size:1rem;filter:drop-shadow(0 0 4px rgba(255,255,255,.3))}
.locseg button:hover{color:var(--text);border-color:color-mix(in srgb,var(--a3) 35%,transparent);background:rgba(55,214,230,.06)}
.locseg button.on{color:#04121a;background:linear-gradient(135deg,var(--a3),var(--a));box-shadow:0 0 18px rgba(55,214,230,.45),inset 0 1px 0 rgba(255,255,255,.4);text-shadow:0 1px 0 rgba(255,255,255,.25)}
.locseg button.on:before{content:'';position:absolute;inset:0;clip-path:inherit;border:1px solid rgba(255,255,255,.5);opacity:.5;animation:locpulse 2.4s ease-in-out infinite}
@keyframes locpulse{50%{opacity:.15}}
.locbar .live{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:.74rem;color:var(--muted);font-family:'JetBrains Mono'}
.locbar .live .led{width:8px;height:8px;border-radius:50%;background:var(--good);box-shadow:0 0 10px var(--good);animation:pulse 2s infinite}
@keyframes pulse{50%{opacity:.35}}
.refreshbtn{display:flex;align-items:center;gap:7px;font:inherit;font-weight:600;font-size:.78rem;cursor:pointer;color:var(--a3);border:1px solid color-mix(in srgb,var(--a3) 40%,transparent);background:color-mix(in srgb,var(--a3) 10%,transparent);border-radius:10px;padding:7px 12px;margin-left:12px}
.refreshbtn:hover{background:color-mix(in srgb,var(--a3) 18%,transparent)}
.stat:hover{border-color:color-mix(in srgb,var(--a3) 35%,transparent);box-shadow:0 0 22px rgba(55,214,230,.12)}
.stat .ic{box-shadow:inset 0 0 14px color-mix(in srgb,var(--a3) 18%,transparent)}
.refreshbtn.spinning svg{animation:spin .7s linear}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:720px){.refreshbtn span{display:none}}
.locbar .clockmini{font-family:'JetBrains Mono';font-size:.74rem;color:var(--muted)}
@media(max-width:860px){.locbar{display:none}}

/* page title (views) */
.viewhead{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;flex-wrap:wrap}
.viewhead .vt{font-family:'Space Grotesk';font-size:1.7rem;font-weight:700}
.viewhead .vs{color:var(--muted);font-size:.9rem;margin-top:3px}
.viewhead .vtag{font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;color:var(--a3);font-weight:700}

/* single-stack: nothing side-by-side in the main column */
.contentpad{max-width:1200px;margin:0 auto;width:100%}
.contentpad .cols{grid-template-columns:1fr !important}
.stack{display:flex;flex-direction:column;gap:16px}
/* 75/25 dashboard zone — main content + widget rail; listings break full width below */
.dashgrid{display:grid;grid-template-columns:minmax(0,3fr) minmax(280px,1fr);gap:16px;align-items:start}
.dashgrid .col-main,.dashgrid .col-rail{display:flex;flex-direction:column;gap:16px;min-width:0}
.fullwidth{margin-top:16px}
@media (min-width:1101px){
  /* equalize column heights: both stretch, and the last panel in each grows to fill any slack */
  .dashgrid{align-items:stretch}
  .dashgrid .col-main > *:last-child,
  .dashgrid .col-rail > *:last-child{flex:1 1 auto;display:flex;flex-direction:column}
  .dashgrid .col-main > *:last-child > .pb,
  .dashgrid .col-rail > *:last-child > .pb{flex:1}
  .dashgrid .col-main > .culturepanel:last-child .culture{height:100%}
}
@media (max-width:1100px){ .dashgrid{grid-template-columns:1fr;align-items:start} .dashgrid .col-rail{position:static} }

/* ===== MISSION COUNTDOWN WIDGET ===== */
.mission{position:relative;overflow:hidden;border:1px solid rgba(120,160,235,.18)}
.mission .mbg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.5}
.mission .mov{position:absolute;inset:0;background:linear-gradient(115deg,rgba(6,10,18,.96) 32%,rgba(6,10,18,.55) 70%,rgba(6,10,18,.85))}
.mission .orbit-art{position:absolute;right:-40px;top:50%;transform:translateY(-50%);width:280px;height:280px;border-radius:50%;
  border:1px solid rgba(120,170,255,.25);box-shadow:inset 0 0 60px rgba(91,140,255,.25);opacity:.7}
.mission .orbit-art:before{content:'';position:absolute;inset:38px;border-radius:50%;border:1px dashed rgba(120,170,255,.3)}
.mission .orbit-art:after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;right:18px;top:46%;background:radial-gradient(circle at 35% 30%,#bcd8ff,#3f6edb);box-shadow:0 0 22px #5b8cff;animation:orbiting 14s linear infinite}
@keyframes orbiting{from{transform:rotate(0deg) translateX(120px) rotate(0)}to{transform:rotate(360deg) translateX(120px) rotate(-360deg)}}
.mission .minner{position:relative;z-index:2;padding:22px 24px;display:flex;flex-direction:column;gap:16px}
.mission .mtag{font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;color:var(--a3);font-weight:700;display:flex;align-items:center;gap:9px}
.mission .mtag .dotlive{width:7px;height:7px;border-radius:50%;background:var(--hot);box-shadow:0 0 10px var(--hot);animation:pulse 1.6s infinite}
.mission h2{font-size:1.9rem;line-height:1.05;letter-spacing:-.02em}
.mission .mvehicle{color:#bfd0e8;font-size:.92rem}
.mission .mvehicle b{color:#fff}
.mission .cd{display:flex;gap:10px;margin-top:4px}
.mission .cdcell{min-width:76px;text-align:center;padding:12px 8px;border-radius:13px;border:1px solid rgba(120,170,255,.22);
  background:linear-gradient(180deg,rgba(10,16,28,.7),rgba(6,10,18,.5));backdrop-filter:blur(6px)}
.mission .cdcell b{font-family:'JetBrains Mono';font-size:1.85rem;font-weight:600;color:#dbeaff;display:block;line-height:1;letter-spacing:1px}
.mission .cdcell span{font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-top:6px;display:block}
.mission .mhi{display:flex;gap:18px;flex-wrap:wrap;font-size:.82rem;color:#aebfd8}
.mission .mhi .k{color:var(--dim);display:block;font-size:.64rem;letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px}
.mission .mhl{display:flex;flex-direction:column;gap:6px;margin-top:2px}
.mission .mhl li{list-style:none;font-size:.84rem;color:#c8d6ea;padding-left:18px;position:relative}
.mission .mhl li:before{content:'▸';position:absolute;left:0;color:var(--a3)}

/* ===== SPACE NEWS ===== */
.newslist{display:flex;flex-direction:column}
.newsrow{display:flex;gap:14px;padding:13px 4px;border-bottom:1px solid rgba(26,37,54,.6);cursor:pointer;transition:.14s;border-radius:8px}
.newsrow:last-child{border-bottom:0}
.newsrow:hover{background:rgba(91,140,255,.05)}
.newsrow .nthumb{width:84px;height:60px;border-radius:10px;background-size:cover;background-position:center;flex:none;border:1px solid var(--line2)}
.newsrow .ntag{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;font-weight:700;color:var(--a3)}
.newsrow .ntitle{font-weight:600;font-size:.9rem;margin:3px 0;line-height:1.3}
.newsrow .nmeta{font-size:.74rem;color:var(--muted)}
.newsrow.hot .ntag{color:var(--hot)}

/* ===== WEATHER COMPARE (home vs target) ===== */
.wxcompare{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:stretch}
.wxc{border:1px solid var(--line2);border-radius:14px;padding:15px;text-align:center;background:rgba(5,9,16,.5)}
.wxc .place{font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.wxc .ic{font-size:2rem;margin:8px 0 2px}
.wxc .tp{font-family:'JetBrains Mono';font-size:1.7rem;font-weight:600;color:#dbeaff}
.wxc .cd{font-size:.76rem;color:var(--muted);margin-top:3px}
.wxc .hl{font-size:.72rem;color:var(--dim);margin-top:5px;font-family:'JetBrains Mono'}
.wxc.home{border-color:rgba(245,197,96,.3)}
.wxvs{display:grid;place-items:center;font-family:'Space Grotesk';font-weight:700;color:var(--dim);font-size:.8rem}
.wxdelta{margin-top:10px;text-align:center;font-size:.8rem;color:#c3d1e6}
.wxdelta b{color:var(--a3)}

/* ===== FEATURED ZILLOW ===== */
.zfeat{border:1px solid rgba(120,160,235,.2);border-radius:14px;overflow:hidden;background:rgba(5,9,16,.5)}
.zfeat .zimg{height:130px;background-size:cover;background-position:center;position:relative}
.zfeat .zmatch{position:absolute;top:10px;right:10px;font-size:.68rem;font-weight:700;color:#04121a;background:var(--good);padding:4px 9px;border-radius:999px}
.zfeat .zbody{padding:13px 15px}
.zfeat .zprice{font-family:'Space Grotesk';font-size:1.3rem;font-weight:700;color:#fff}
.zfeat .zspec{font-size:.8rem;color:var(--muted);margin:3px 0 8px}
.zfeat .zaddr{font-size:.82rem;color:#c3d1e6}
.zfeat .zwhy{font-size:.78rem;color:var(--a3);margin-top:8px;display:flex;gap:7px}
.zfeat .zwhy:before{content:'✦';flex:none}
.zfeat .zcta{display:block;text-align:center;margin-top:12px;font-weight:600;font-size:.82rem;padding:10px;border-radius:10px;border:1px solid var(--line2);color:var(--text)}
.zfeat .zcta:hover{border-color:var(--a3);color:var(--a3)}

/* ===== DATA TABLE (Jobs / Companies / Candidates / Reports) ===== */
.dtable{width:100%;border-collapse:collapse;font-size:.86rem}
.dtable th{text-align:left;font-size:.64rem;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);font-weight:600;padding:11px 12px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(11,17,27,.6)}
.dtable th.r,.dtable td.r{text-align:right}
.dtable td{padding:13px 12px;border-bottom:1px solid rgba(26,37,54,.55);vertical-align:middle}
.dtable tr{cursor:pointer;transition:background .12s}
.dtable tbody tr:hover{background:rgba(91,140,255,.05)}
.dtable .co{display:flex;align-items:center;gap:10px}
.dtable .lg{width:34px;height:34px;border-radius:9px;flex:none;display:grid;place-items:center;font-family:'Space Grotesk';font-weight:700;font-size:.82rem;color:#fff}
.dtable .ti b{display:block;font-weight:600;color:var(--text)}
.dtable .ti span{font-size:.76rem;color:var(--muted)}
.dtable .salcell{font-family:'JetBrains Mono';font-weight:600;color:var(--good)}
.savebtn{cursor:pointer;color:var(--dim);font-size:1.05rem;line-height:1;transition:.14s;background:none;border:0}
.savebtn.on{color:var(--gold);text-shadow:0 0 12px rgba(245,197,96,.5)}

/* ===== KANBAN PIPELINE ===== */
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.kcol{border:1px solid var(--line);border-radius:14px;background:rgba(5,9,16,.4);padding:12px;min-height:120px}
.kcol h4{font-size:.74rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;justify-content:space-between}
.kcol h4 .ct{color:var(--a3)}
.kcol .ksub{font-size:.68rem;color:var(--dim);margin:-6px 0 10px;line-height:1.35}
.vmodel-legend{font-size:.8rem;color:#c3d1e6;line-height:1.55;border-left:3px solid var(--a3);padding:4px 0 4px 12px;margin-bottom:14px}
.kcard{border:1px solid var(--line2);border-radius:11px;padding:11px;background:rgba(13,20,32,.7);margin-bottom:9px;cursor:pointer}
.kcard:hover{border-color:var(--a3)}
.kcard b{font-size:.84rem;font-weight:600;display:block}
.kcard span{font-size:.74rem;color:var(--muted)}
.kcard .ks{font-family:'JetBrains Mono';font-size:.76rem;color:var(--good);margin-top:5px;display:block}
@media(max-width:900px){.kanban{grid-template-columns:1fr 1fr}}
@media(max-width:560px){.kanban{grid-template-columns:1fr}}

/* ===== MESSAGES / ALERTS ===== */
.msglist,.alertlist{display:flex;flex-direction:column;gap:10px}
.msgrow{display:flex;gap:12px;padding:12px;border:1px solid var(--line);border-radius:13px;background:rgba(5,9,16,.4);cursor:pointer;transition:.14s}
.msgrow:hover{border-color:var(--a3)}
.msgrow img{width:42px;height:42px;border-radius:50%;object-fit:cover;flex:none;border:1px solid var(--line2)}
.msgrow .mt{flex:1;min-width:0}
.msgrow .mt .top{display:flex;justify-content:space-between;gap:8px}
.msgrow .mt .nm{font-weight:600;font-size:.88rem}
.msgrow .mt .tm{font-size:.72rem;color:var(--dim)}
.msgrow .mt .pv{font-size:.8rem;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.msgrow .unread{width:9px;height:9px;border-radius:50%;background:var(--a3);flex:none;align-self:center}
.alertrow{display:flex;gap:12px;align-items:flex-start;padding:12px;border:1px solid var(--line);border-left-width:3px;border-radius:11px;background:rgba(5,9,16,.4)}
.alertrow .aic{width:34px;height:34px;border-radius:9px;flex:none;display:grid;place-items:center}
.alertrow b{font-size:.86rem}
.alertrow span{display:block;font-size:.76rem;color:var(--muted);margin-top:2px}

/* ===== SKILLS-MATCH METER (dossier) ===== */
.matchmeter{display:flex;align-items:center;gap:14px;margin-bottom:6px}
.matchmeter .ringbig{width:64px;height:64px;flex:none;border-radius:50%;display:grid;place-items:center;font-family:'Space Grotesk';font-weight:700;font-size:1.05rem;color:#fff}
.matchmeter .mtext b{font-size:.9rem}
.matchmeter .mtext span{display:block;font-size:.78rem;color:var(--muted)}
.skmatch{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px}
.sktab{width:100%;border-collapse:collapse;margin:12px 0 4px;font-size:.82rem}
.sktab th{text-align:left;font-size:.62rem;letter-spacing:.09em;text-transform:uppercase;color:var(--dim);font-weight:600;padding:0 8px 7px;border-bottom:1px solid var(--line)}
.sktab td{padding:9px 8px;border-bottom:1px solid rgba(26,37,54,.55);vertical-align:middle}
.sktab td b{font-weight:600;color:#eaf1fb}
.sktab td .wt{margin-left:7px;font-size:.6rem;color:var(--a3);letter-spacing:1px;vertical-align:middle}
.sktab td.nt{color:var(--muted);font-size:.76rem;line-height:1.4}
.sktab .cv{font-size:.72rem;font-weight:700;white-space:nowrap;padding:4px 9px;border-radius:999px}
.sktab .cv.direct{color:#bff0d6;border:1px solid rgba(55,224,160,.45);background:rgba(55,224,160,.12)}
.sktab .cv.transfer{color:#bfe6ff;border:1px solid rgba(55,150,230,.45);background:rgba(55,150,230,.12)}
.sktab .cv.gap{color:#ffd9a6;border:1px solid rgba(245,197,96,.45);background:rgba(245,197,96,.12)}
.gapnote{font-size:.8rem;line-height:1.5;color:#ffe2b6;border:1px solid rgba(245,197,96,.3);background:rgba(245,197,96,.06);border-radius:10px;padding:10px 12px;margin:10px 0 0}
.gapnote b{color:#fff}
/* ATS keyword delta */
.kwgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:4px}
.kwh{font-size:.72rem;font-weight:700;letter-spacing:.04em;margin-bottom:8px}
.kwh.ok{color:var(--good)} .kwh.miss{color:var(--gold)}
.kwtags{display:flex;flex-wrap:wrap;gap:6px}
.kw{font-family:'JetBrains Mono';font-size:.72rem;padding:4px 8px;border-radius:7px;border:1px solid var(--line2)}
.kw.ok{color:#bdf0d6;border-color:rgba(55,224,160,.3);background:rgba(55,224,160,.06)}
.kw.miss{color:#f5d98a;border-color:rgba(245,197,96,.4);background:rgba(245,197,96,.08)}
.kw.none{color:var(--dim)}
@media(max-width:560px){.kwgrid{grid-template-columns:1fr}}
.solfit{margin-top:12px;border:1px solid rgba(55,214,230,.28);background:rgba(55,214,230,.06);border-radius:11px;padding:11px 13px}
.solfit.under{border-color:rgba(255,111,134,.35);background:rgba(255,111,134,.07)}
.solfit .solh{font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;color:var(--a3);font-weight:700;margin-bottom:5px}
.solfit.under .solh{color:var(--bad)}
.solfit p{margin:0;font-size:.82rem;color:#cfe0f0;line-height:1.5}
/* salary breakdown */
.brkwrap{display:flex;flex-direction:column;gap:8px;margin:4px 0 12px}
.brk{display:grid;grid-template-columns:185px 1fr 78px;gap:10px;align-items:center;font-size:.8rem}
.brk .bl{color:var(--muted)}
.brk .btk{height:9px;border-radius:6px;background:rgba(255,255,255,.05);overflow:hidden}
.brk .btk i{display:block;height:100%;border-radius:6px}
.brk .bv{text-align:right;font-family:'JetBrains Mono';font-weight:600;color:#eaf1fb}
.brkgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:4px 0 10px}
.brkgrid div{border:1px solid var(--line2);border-radius:11px;padding:11px;text-align:center;background:rgba(5,8,13,.4)}
.brkgrid b{font-family:'Space Grotesk';font-size:1.3rem;display:block}
.brkgrid span{font-size:.7rem;color:var(--muted)}
.brknote{font-size:.82rem;line-height:1.55;color:#cfe0f0;margin:0;border-left:3px solid var(--a3);padding:8px 12px;background:rgba(55,214,230,.05);border-radius:0 10px 10px 0}
@media (max-width:560px){.brk{grid-template-columns:120px 1fr 64px}.brkgrid{grid-template-columns:1fr}}
.skmatch span{font-size:.74rem;font-weight:600;border-radius:7px;padding:5px 9px;display:flex;align-items:center;gap:5px}
.skmatch .hit{color:#bff0d6;border:1px solid rgba(55,224,160,.4);background:rgba(55,224,160,.1)}

.gbtn.ghost{background:rgba(255,255,255,.03);color:var(--text);border-color:var(--line2)}

.gbtn svg{width:18px;height:18px}
.gor{display:flex;align-items:center;gap:10px;color:var(--dim);font-size:.74rem;margin:2px 0}

.pinlabel{font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--a3);font-weight:700;text-shadow:0 0 12px color-mix(in srgb,var(--a3) 60%,transparent)}

.vaultbtn{background:linear-gradient(180deg,var(--a),var(--a2));color:#fff;border:0;font-weight:700;letter-spacing:.03em;box-shadow:0 8px 28px color-mix(in srgb,var(--a) 40%,transparent);width:100%}
.vaultbtn:hover{filter:brightness(1.1)}

.vkey[data-k="clr"],.vkey[data-k="del"]{color:#9fb0c9!important;font-size:1.05rem!important}

.vaultdial{position:relative;width:118px;height:118px;margin:0 auto 14px;display:grid;place-items:center}
.vaultdial .vring{position:absolute;border-radius:50%;border:1.5px solid color-mix(in srgb,var(--a3) 35%,transparent)}
.vaultdial .r1{inset:0;border-top-color:var(--a3);border-right-color:transparent;animation:vspin 5s linear infinite}
.vaultdial .r2{inset:12px;border-bottom-color:var(--a);border-left-color:transparent;animation:vspin 7s linear infinite reverse}
.vaultdial .r3{inset:24px;border-style:dashed;border-color:color-mix(in srgb,var(--a2) 45%,transparent);animation:vspin 12s linear infinite}
@keyframes vspin{to{transform:rotate(360deg)}}
.vaultdial .vcore{position:relative;z-index:2;display:grid;place-items:center;filter:drop-shadow(0 0 14px color-mix(in srgb,var(--a3) 60%,transparent))}
.vaultdial .vticks{position:absolute;inset:-4px;border-radius:50%;

.vaultdial.unlocked .vring{border-color:var(--good) !important;animation-duration:.6s}
.vaultdial.unlocked .vcore{animation:vpop .5s}
